\\n\\r\\n#### 1단계: state를 설정하는 것에서 action을 dispatch 함수로 전달하는 것으로 바꾸기\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/react.png\",\"url\":\"/post/2024-06-25-3_5_Extracting-state-logic-into-a-reducer\"},{\"slug\":\"2024-06-24-3_1_Reacting_to_Input_with_State\",\"title\":\"Reacting to Input with State\",\"date\":\"2024-06-24\",\"categories\":[\"javascript\",\"ReactJs\"],\"tags\":[\"javascript\",\"ReactJs\"],\"excerpt\":\"Reacting to Input with State State를 사용해 Input 다루기 선언형 UI와 명령형 UI 선언형 UI와 명령형 UI 비교 명령형 UI 선언형 UI 폼에 무언가를 입력하면 “제출” 버튼이 활성화된다. ”제출” 버튼을 누르면 폼과 버튼이 비활성화\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## Reacting to Input with State\\r\\n\u003e State를 사용해 Input 다루기\\r\\n\\r\\n### 선언형 UI와 명령형 UI\\r\\n\\r\\n\u003ctable\u003e\\r\\n  \u003ccaption\u003e선언형 UI와 명령형 UI 비교\u003c/caption\u003e\\r\\n  \u003cthead\u003e\\r\\n    \u003ctr\u003e\\r\\n      \u003cth scope='col'\u003e명령형 UI\u003c/th\u003e\\r\\n      \u003cth scope='col'\u003e선언형 UI\u003c/th\u003e\\r\\n    \u003c/tr\u003e\\r\\n  \u003c/thead\u003e\\r\\n  \u003ctbody\u003e\\r\\n    \u003ctr\u003e\\r\\n      \u003ctd\u003e\\r\\n       - 폼에 무언가를 입력하면 “제출” 버튼이 활성화된다.\u003cbr\u003e\\r\\n       - ”제출” 버튼을 누르면 폼과 버튼이 비활성화되고 스피너가 나타난다.\u003cbr\u003e\\r\\n       - 네트워크 요청이 성공하면 폼은 숨겨질 것이고 “감사합니다.” 메시지가 나타난다.\u003cbr\u003e\\r\\n       - 네트워크 요청이 실패하면 오류 메시지가 보일 것이고 폼은 다시 활성화된다.\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/react.png\",\"url\":\"/post/2024-06-24-3_1_Reacting_to_Input_with_State\"},{\"slug\":\"2024-06-24-3_2_choosing-the-state-structure\",\"title\":\"Choosing the state structure\",\"date\":\"2024-06-24\",\"categories\":[\"javascript\",\"ReactJs\"],\"tags\":[\"javascript\",\"ReactJs\"],\"excerpt\":\"Choosing the state structure State 구조 선택하기 State 구조화 원칙 연관된 state 그룹화하기. 두 개 이상의 state 변수를 항상 동시에 업데이트한다면, 단일 state 변수로 병합하는 것을 고려해라. State의 모순 피하기. 여\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## Choosing the state structure\\r\\n\u003e State 구조 선택하기\\r\\n\\r\\n\\r\\n### State 구조화 원칙\\r\\n\\r\\n- \u003cb\u003e연관된 state 그룹화하기.\u003c/b\u003e\u003cbr\u003e\\r\\n두 개 이상의 state 변수를 항상 동시에 업데이트한다면, 단일 state 변수로 병합하는 것을 고려해라.\\r\\n\\r\\n- \u003cb\u003eState의 모순 피하기.\u003c/b\u003e\u003cbr\u003e\\r\\n여러 state 조각이 서로 모순되고 “불일치”할 수 있는 방식으로 state를 구성하는 것은 실수가 발생할 여지를 만든다.\\r\\n\\r\\n- \u003cb\u003e불필요한 state 피하기.\u003c/b\u003e\u003cbr\u003e\\r\\n렌더링 중에 컴포넌트의 props나 기존 state 변수에서 일부 정보를 계산할 수 있다면, 컴포넌트의 state에 해당 정보를 넣지 않아야 한다.\\r\\n\\r\\n- \u003cb\u003eState의 중복 피하기.\u003c/b\u003e\u003cbr\u003e\\r\\n여러 상태 변수 간 또는 중첩된 객체 내에서 동일한 데이터가 중복될 경우 동기화를 유지하기가 어렵다.\\r\\n\\r\\n- \u003cb\u003e깊게 중\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/react.png\",\"url\":\"/post/2024-06-24-3_2_choosing-the-state-structure\"},{\"slug\":\"2024-06-24-3_3_Sharing_State_Between_Components\",\"title\":\"Sharing state between Components\",\"date\":\"2024-06-24\",\"categories\":[\"javascript\",\"ReactJs\"],\"tags\":[\"javascript\",\"ReactJs\"],\"excerpt\":\"Sharing state between Components 컴포넌트 간 State 공유하기 State 끌어올리기 예제 아래는 한 패널의 버튼을 눌러도 다른 패널에는 영향을 미치지 않고 독립적인 코드입니다. js import { useState } from 'react'\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## Sharing state between Components\\r\\n\u003e 컴포넌트 간 State 공유하기\\r\\n\\r\\n### State 끌어올리기 예제\\r\\n\\r\\n아래는 한 패널의 버튼을 눌러도 다른 패널에는 영향을 미치지 않고 독립적인 코드입니다.\\r\\n\\r\\n```js\\r\\nAccordion                                                                       \\r\\n├─Panel\\r\\n└─Panel\\r\\n```\\r\\n```js\\r\\nimport { useState } from 'react';\\r\\n\\r\\nfunction Panel({ title, children }) {\\r\\n  const [isActive, setIsActive] = useState(false);\\r\\n  return (\\r\\n    \u003csection className=\\\"panel\\\"\u003e\\r\\n      \u003ch3\u003e{title}\u003c/h3\u003e\\r\\n      {isActive ? (\\r\\n        \u003cp\u003e{ch\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/react.png\",\"url\":\"/post/2024-06-24-3_3_Sharing_State_Between_Components\"},{\"slug\":\"2024-06-19-2_3_Render_and_Commit\",\"title\":\"Render and Commit\",\"date\":\"2024-06-19\",\"categories\":[\"javascript\",\"ReactJs\"],\"tags\":[\"javascript\",\"ReactJs\"],\"excerpt\":\"Render and Commit 렌더링 그리고 커밋 UI를 요청하고 제공하는데까지 세 단계로 나눌 수 있다. 음식점이라고 상상하고 이 단계들을 표현해보겠다. 1. 렌더링 트리거 손님의 주문을 주방으로 전달 2. 컴포넌트 렌더링 주방에서 주문 준비하기 3. DOM에 커밋\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## Render and Commit\\r\\n\u003e 렌더링 그리고 커밋\\r\\n\\r\\n UI를 요청하고 제공하는데까지 세 단계로 나눌 수 있다.\u003cbr\u003e\\r\\n 음식점이라고 상상하고 이 단계들을 표현해보겠다.\\r\\n\\r\\n1. 렌더링 \u003cb\u003e트리거\u003c/b\u003e (손님의 주문을 주방으로 전달)\\r\\n2. 컴포넌트 \u003cb\u003e렌더링\u003c/b\u003e (주방에서 주문 준비하기)\\r\\n3. DOM에 \u003cb\u003e커밋\u003c/b\u003e (테이블에 주문한 요리 내놓기)\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n\u003cimg src=\\\"https://jayj-fe.github.io/blogAPI/assets/img/react/i_rerender.png\\\" alt=\\\"\\\" style=\\\"max-width:500px\\\"\u003e\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n### 1단계: 렌더링 트리거\\r\\n컴포넌트 렌더링이 일어나는 데에는 두 가지 이유가 있다.\\r\\n\\r\\n1. 컴포넌트의 초기 렌더링인 경우\\r\\n2. 컴포넌트의 state가 업데이트된 경우\\r\\n\\r\\n#### 초기 렌더링\\r\\n\\r\\n앱을 시작할 때 초기 렌더링을 트리거해야 한다\u003cbr\u003e\\r\\nDOM 노드와 함께 ```createRoot\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/react.png\",\"url\":\"/post/2024-06-19-2_3_Render_and_Commit\"},{\"slug\":\"2024-06-19-2_4_State_as_a_Snapshot\",\"title\":\"State as a Snapshot\",\"date\":\"2024-06-19\",\"categories\":[\"javascript\",\"ReactJs\"],\"tags\":[\"javascript\",\"ReactJs\"],\"excerpt\":\"State as a Snapshot 스냅샷으로서의 State state를 설정하면 렌더링이 동작한다 클릭과 같은 사용자 이벤트에 반응하여 사용자 인터페이스가 직접 변경된다고 생각할 수 있다. js import { useState } from 'react'; export\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## State as a Snapshot\\r\\n\u003e 스냅샷으로서의 State\\r\\n\\r\\n### state를 설정하면 렌더링이 동작한다\\r\\n클릭과 같은 사용자 이벤트에 반응하여 사용자 인터페이스가 직접 변경된다고 생각할 수 있다.\\r\\n\\r\\n```js\\r\\nimport { useState } from 'react';\\r\\n\\r\\nexport default function Form() {\\r\\n  const [isSent, setIsSent] = useState(false);\\r\\n  const [message, setMessage] = useState('Hi!');\\r\\n  if (isSent) {\\r\\n    return \u003ch1\u003eYour message is on its way!\u003c/h1\u003e\\r\\n  }\\r\\n  return (\\r\\n    \u003cform onSubmit={(e) =\u003e {\\r\\n      e.preventDefault();\\r\\n      setIsSent(true);\\r\\n      sendMessage(mes\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/react.png\",\"url\":\"/post/2024-06-19-2_4_State_as_a_Snapshot\"},{\"slug\":\"2024-06-19-2_5_Queueing_a_Series_of_State_Updates\",\"title\":\"Queueing a Series of State Updates\",\"date\":\"2024-06-19\",\"categories\":[\"javascript\",\"ReactJs\"],\"tags\":[\"javascript\",\"ReactJs\"],\"excerpt\":\"Queueing a Series of State Updates state 업데이트 큐 React state batches 업데이트 를 세 번 호출하므로 “+3” 버튼을 클릭하면 세 번 증가할 것으로 예상할 수 있다. js import { useState } from '\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## Queueing a Series of State Updates\\r\\n\u003e state 업데이트 큐\\r\\n\\r\\n### React state batches 업데이트\\r\\n```setNumber(number + 1)```를 세 번 호출하므로 “+3” 버튼을 클릭하면 세 번 증가할 것으로 예상할 수 있다.\\r\\n\\r\\n```js\\r\\nimport { useState } from 'react';\\r\\n\\r\\nexport default function Counter() {\\r\\n  const [number, setNumber] = useState(0);\\r\\n\\r\\n  return (\\r\\n    \u003c\u003e\\r\\n      \u003ch1\u003e{number}\u003c/h1\u003e\\r\\n      \u003cbutton onClick={() =\u003e {\\r\\n        setNumber(number + 1);\\r\\n        setNumber(number + 1);\\r\\n        setNumber(number + 1);\\r\\n      }}\u003e+3\u003c/button\u003e\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/react.png\",\"url\":\"/post/2024-06-19-2_5_Queueing_a_Series_of_State_Updates\"},{\"slug\":\"2024-06-19-2_6_Updating_objects_in_state\",\"title\":\"Updating Objects in State\",\"date\":\"2024-06-19\",\"categories\":[\"javascript\",\"ReactJs\"],\"tags\":[\"javascript\",\"ReactJs\"],\"excerpt\":\"Updating Objects in State 객체 State 업데이트하기 변경이란? State에는 모든 종류의 자바스크립트 값을 저장할 수 있다. x에 들어가는 값들은 변경할 수 없거나 “읽기 전용”을 의미하는 “불변성”을 가진다. 값을 교체 하기 위해서는 리렌더링이\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## Updating Objects in State\\r\\n\u003e 객체 State 업데이트하기\\r\\n\\r\\n### 변경이란?\\r\\nState에는 모든 종류의 자바스크립트 값을 저장할 수 있다.\\r\\n\\r\\n```js\\r\\nconst [x, setX] = useState(0);\\r\\nsetX(5);\\r\\n```\\r\\nx에 들어가는 값들은 변경할 수 없거나 “읽기 전용”을 의미하는 “불변성”을 가진다.\u003cbr/\u003e\\r\\n값을 교체 하기 위해서는 리렌더링이 필요한다.(\u003cb\u003esetX를 이용\u003c/b\u003e)\u003cbr/\u003e\\r\\nx state는 0에서 5로 바뀌었지만, 숫자 0 자체 는 바뀌지 않았다.\u003cbr/\u003e\\r\\n숫자, 문자열, 불리언과 같이 자바스크립트에 정의되어 있는 원시 값들은 변경할 수 없다.\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n```js\\r\\nconst [position, setPosition] = useState({ x: 0, y: 0 });\\r\\n```\\r\\n기술적으로 객체 자체 의 내용은 바꿀 수 있다.\u003cbr\u003e\\r\\n이것을 \u003cb\u003e변경(mutati\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/react.png\",\"url\":\"/post/2024-06-19-2_6_Updating_objects_in_state\"},{\"slug\":\"2024-06-19-2_7_Updating-arrays-in-state\",\"title\":\"Updating Arrays In State\",\"date\":\"2024-06-19\",\"categories\":[\"javascript\",\"ReactJs\"],\"tags\":[\"javascript\",\"ReactJs\"],\"excerpt\":\"Updating Arrays In State 배열 State 업데이트하기 변경하지 않고 배열 업데이트하기 객체와 마찬가지로 React state에서 배열은 읽기 전용으로 처리해야 한다. 즉 처럼 배열 내부의 항목을 재할당해서는 안 되며 나 같은 함수로 배열을 변경해서는\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## Updating Arrays In State\\r\\n\u003e 배열 State 업데이트하기\\r\\n\\r\\n### 변경하지 않고 배열 업데이트하기\\r\\n객체와 마찬가지로 React state에서 배열은 읽기 전용으로 처리해야 한다.\u003cbr\u003e\\r\\n즉 ```arr[0] = 'bird'```처럼 배열 내부의 항목을 재할당해서는 안 되며 ```push()```나 ```pop()```같은 함수로 배열을 변경해서는 안된다.\u003cbr\u003e\\r\\n\u003cbr\u003e\\r\\n배열을 업데이트할 때마다 ```filter()```나 ```map()```을 이용하여 새 배열을 state 설정 함수에 전달해야 한다.\\r\\n\u003cbr\u003e\\r\\n\\r\\n\u003ctable\u003e\\r\\n  \u003ccaption\u003eUpdating Arrays In State\u003c/caption\u003e\\r\\n  \u003cthead\u003e\\r\\n    \u003ctr\u003e\\r\\n      \u003cth scope='col'\u003e\u003c/th\u003e\\r\\n      \u003cth scope='col'\u003e비선호(배열을 변경)\u003c/th\u003e\\r\\n      \u003cth scope='col'\u003e선호\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/react.png\",\"url\":\"/post/2024-06-19-2_7_Updating-arrays-in-state\"},{\"slug\":\"2024-06-18-2_1_Responding_to_Events\",\"title\":\"Responding to Events\",\"date\":\"2024-06-18\",\"categories\":[\"javascript\",\"ReactJs\"],\"tags\":[\"javascript\",\"ReactJs\"],\"excerpt\":\"Responding to Events 이벤트에 응답하기 이벤트 핸들러 추가하기 이벤트 핸들러 추가를 위해서는 먼저 함수를 정의하고 이를 적절한 JSX 태그에 prop 형태로 전달해야 한다. Button 컴포넌트 내부에 handleClick 함수를 선언한다. 해당 함수 \",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## Responding to Events\\r\\n\u003e 이벤트에 응답하기\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n### 이벤트 핸들러 추가하기\\r\\n이벤트 핸들러 추가를 위해서는 먼저 함수를 정의하고 이를 적절한 JSX 태그에 prop 형태로 전달해야 한다.\\r\\n\\r\\n```js\\r\\nexport default function Button() {\\r\\n  function handleClick() {\\r\\n    alert('You clicked me!');\\r\\n  }\\r\\n\\r\\n  return (\\r\\n    \u003cbutton onClick={handleClick}\u003e\\r\\n      Click me\\r\\n    \u003c/button\u003e\\r\\n  );\\r\\n}\\r\\n```\\r\\n\u003eButton 컴포넌트 내부에 handleClick 함수를 선언한다.\u003cbr\u003e\\r\\n\u003e해당 함수 내부 로직을 구현합니다. 이번에는 메시지를 표시하기 위해 alert를 사용한다.\u003cbr\u003e\\r\\n\u003e```\u003cbutton\u003e``` JSX에 ```onClick={handleClick}```을 추\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/react.png\",\"url\":\"/post/2024-06-18-2_1_Responding_to_Events\"},{\"slug\":\"2024-06-18-2_2_State_A_Components_Memory\",\"title\":\"State A Components Memory\",\"date\":\"2024-06-18\",\"categories\":[\"javascript\",\"ReactJs\"],\"tags\":[\"javascript\",\"ReactJs\"],\"excerpt\":\"State: A Components Memory State: 컴포넌트의 기억 저장소 일반 변수로 충분하지 않은 경우 js import { sculptureList } from './data.js'; export default function Gallery { let i\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## State: A Components Memory\\r\\n\u003e State: 컴포넌트의 기억 저장소\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n### 일반 변수로 충분하지 않은 경우\\r\\n```js\\r\\nimport { sculptureList } from './data.js';\\r\\n\\r\\nexport default function Gallery() {\\r\\n  let index = 0;\\r\\n\\r\\n  function handleClick() {\\r\\n    index = index + 1;\\r\\n  }\\r\\n\\r\\n  let sculpture = sculptureList[index];\\r\\n  return (\\r\\n    \u003c\u003e\\r\\n      \u003cbutton onClick={handleClick}\u003e\\r\\n        Next\\r\\n      \u003c/button\u003e\\r\\n      \u003ch2\u003e\\r\\n        \u003ci\u003e{sculpture.name} \u003c/i\u003e \\r\\n        by {sculpture.artist}\\r\\n      \u003c/h2\u003e\\r\\n      \u003ch\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/react.png\",\"url\":\"/post/2024-06-18-2_2_State_A_Components_Memory\"},{\"slug\":\"2024-06-17-1_1_Your_First_Component\",\"title\":\"Your First Component\",\"date\":\"2024-06-17\",\"categories\":[\"javascript\",\"ReactJs\"],\"tags\":[\"javascript\",\"ReactJs\"],\"excerpt\":\"Your First Component 첫번째 컴포넌트 컴포넌트: UI 구성 요소 React에서의 컴포넌트 : 마크업, CSS, JavaScript를 앱의 재사용 가능한 사용자 정의 UI 요소. 컴포넌트를 작성, 순서 지정 및 중첩하여 전체 페이지를 디자인할 수 있다. \",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## Your First Component\\r\\n\u003e 첫번째 컴포넌트\\r\\n\u003cbr\u003e\\r\\n\\r\\n### 컴포넌트: UI 구성 요소 \\r\\n\\r\\nReact에서의 컴포넌트 : 마크업, CSS, JavaScript를 앱의 재사용 가능한 사용자 정의 UI 요소.\u003cbr\u003e\\r\\n컴포넌트를 작성, 순서 지정 및 중첩하여 전체 페이지를 디자인할 수 있다.\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n### 컴포넌트 정의하기\\r\\n\\r\\nReact 컴포넌트는 마크업으로 뿌릴 수 있는 JavaScript 함수이다. \u003cbr/\u003e\\r\\n\\r\\n```js\\r\\nexport default function Profile() {\\r\\n  return (\\r\\n    \u003cimg\\r\\n      src=\\\"https://i.imgur.com/MK3eW3Am.jpg\\\"\\r\\n      alt=\\\"Katherine Johnson\\\"\\r\\n    /\u003e\\r\\n  )\\r\\n}\\r\\n\\r\\n```\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n#### Step 1: 컴포넌트 내보내기\\r\\nexport 를 이용하여 내보낸다.\u003cbr\u003e\\r\\n``\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/react.png\",\"url\":\"/post/2024-06-17-1_1_Your_First_Component\"},{\"slug\":\"2024-06-17-1_2_Importing_and_Exporting_Componentsy\",\"title\":\"Your First Component\",\"date\":\"2024-06-17\",\"categories\":[\"javascript\",\"ReactJs\"],\"tags\":[\"javascript\",\"ReactJs\"],\"excerpt\":\"Importing and Exporting Components 컴포넌트 import 및 export 하기 Root 컴포넌트란 App.js 라는 파일이 대부분 만들어지고 이게 루트이며, 모든 컴포넌트는 이런 루트 안에 존재하게된다. 만약 Next.js 같은 프레임워크일 \",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## Importing and Exporting Components\\r\\n\u003e 컴포넌트 import 및 export 하기\\r\\n\u003cbr\u003e\\r\\n\\r\\n### Root 컴포넌트란\\r\\n\\r\\nApp.js 라는 파일이 대부분 만들어지고 이게 루트이며, 모든 컴포넌트는 이런 루트 안에 존재하게된다.\u003cbr/\u003e\\r\\n만약 Next.js 같은 프레임워크일 경우, 매 페이지 마다 Root component 가 달라진다.\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n### 컴포넌트를 import 하거나 export 하는 방법\\r\\n\\r\\n1. 컴포넌트를 추가할 JS 파일을 생성한다.\\r\\n2. 새로 만든 파일에서 함수 컴포넌트를 export 한다.\\r\\n\u003e default 또는 named export 방식을 사용한다.\\r\\n3. 컴포넌트를 사용할 파일에서 import 한다.\\r\\n\u003e 적절한 방식을 선택해서 default 또는 named로 import 한다.\\r\\n\\r\\n```js\\r\\nimport Gallery from './Gallery.js';\\r\\n\\r\\ne\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/react.png\",\"url\":\"/post/2024-06-17-1_2_Importing_and_Exporting_Componentsy\"},{\"slug\":\"2024-06-17-1_3_Writing_Markup_with_JSX\",\"title\":\"Writing Markup with JSX\",\"date\":\"2024-06-17\",\"categories\":[\"javascript\",\"ReactJs\"],\"tags\":[\"javascript\",\"ReactJs\"],\"excerpt\":\"Writing Markup with JSX 첫번째 컴포넌트 JSX: JavaScript에 마크업 넣기 원래의 Web은 HTML, CSS, JavaScript를 기반으로써, HTML로 내용을, CSS로 디자인을, JavaScript로 로직을 작성하면서 각각 별도의 파일로\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## Writing Markup with JSX\\r\\n\u003e 첫번째 컴포넌트\\r\\n\u003cbr\u003e\\r\\n\\r\\n### JSX: JavaScript에 마크업 넣기\\r\\n원래의 Web은 HTML, CSS, JavaScript를 기반으로써,\u003cbr\u003e\\r\\nHTML로 내용을, CSS로 디자인을, JavaScript로 로직을 작성하면서 각각 별도의 파일로 관리했다.\u003cbr\u003e\\r\\n\u003cbr\u003e\\r\\n그러나 Web이 더욱 인터랙티브해지면서 로직이 내용을 결정하는 경우가 많아졌고, 그래서 JavaScript가 HTML을 담당하게 되었다 !\u003cbr\u003e\\r\\n이것이 바로 React에서 \u003cb\u003e렌더링 로직과 마크업이 같은 위치(컴포넌트)에 함께 있게 된 이유\u003c/b\u003e이다. \\r\\n\u003cbr\u003e\\r\\n로직과 마크업이 공존하면 서로 싱크를 맞추기가 수월하다.\u003cbr\u003e\\r\\n그리고 각 컨포넌트의 렌더링 로직/html 을 분리해서 관리 할 수 있어서 서로 관여를 없앨 수 있다.\u003cbr\u003e\\r\\nReact 컴포넌트는 JSX라는 확장된 문법을 사용하여 마크업을 나타낸\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/react.png\",\"url\"  return (\\r\\n    \u003cimg\\r\\n      className=\\\"avatar\\\"\\r\\n      src=\\\"https://i.imgur.com/1bX5QH6.jpg\\\"\\r\\n      alt=\\\"Lin Lanying\\\"\\r\\n      width={100}\\r\\n      height={100}\\r\\n    /\u003e\\r\\n  );\\r\\n}\\r\\n\\r\\nexport default function Profile() {\\r\\n  return (\\r\\n    \u003cAvatar /\u003e\\r\\n  );\\r\\n}\\r\\n```\\r\\n\\r\\n### 컴포넌트에 props 전달하기\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/react.png\",\"url\":\"/post/2024-06-17-1_5_Passing_Props_to_a_Component\"},{\"slug\":\"2024-06-17-1_6_Conditional_Rendering\",\"title\":\"Conditional Rendering\",\"date\":\"2024-06-17\",\"categories\":[\"javascript\",\"ReactJs\"],\"tags\":[\"javascript\",\"ReactJs\"],\"excerpt\":\"Conditional Rendering 조건부 렌더링 조건부로 JSX 반환하기 js function Item { name, isPacked } { if isPacked { return {name} ✔ ; } return {name} ; } export default f\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## Conditional Rendering\\r\\n\u003e 조건부 렌더링\\r\\n\u003cbr\u003e\\r\\n\\r\\n### 조건부로 JSX 반환하기\\r\\n```js\\r\\nfunction Item({ name, isPacked }) {\\r\\n  if (isPacked) {\\r\\n    return \u003cli className=\\\"item\\\"\u003e{name} ✔\u003c/li\u003e;\\r\\n  }\\r\\n  return \u003cli className=\\\"item\\\"\u003e{name}\u003c/li\u003e;\\r\\n}\\r\\n\\r\\nexport default function PackingList() {\\r\\n  return (\\r\\n    \u003csection\u003e\\r\\n      \u003ch1\u003eSally Ride's Packing List\u003c/h1\u003e\\r\\n      \u003cul\u003e\\r\\n        \u003cItem \\r\\n          isPacked={true} \\r\\n          name=\\\"Space suit\\\" \\r\\n        /\u003e\\r\\n        \u003cItem \\r\\n          isPacked={true}\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/react.png\",\"url\":\"/post/2024-06-17-1_6_Conditional_Rendering\"},{\"slug\":\"2024-06-18-1_7_Rendering_Lists\",\"title\":\"Rendering Lists\",\"date\":\"2024-06-17\",\"categories\":[\"javascript\",\"ReactJs\"],\"tags\":[\"javascript\",\"ReactJs\"],\"excerpt\":\"Rendering Lists 리스트 렌더링 배열을 데이터로 렌더링하기 1. 데이터를 배열로 만든다. 2. people의 요소를 새로운 JSX 노드 배열인 listItems에 매핑한다. 3. 로 래\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## Rendering Lists\\r\\n\u003e 리스트 렌더링\\r\\n\u003cbr\u003e\\r\\n\\r\\n### 배열을 데이터로 렌더링하기\\r\\n\\r\\n#### 1. 데이터를 배열로 만든다.\\r\\n```js\\r\\nconst people = [\\r\\n  'Creola Katherine Johnson: mathematician',\\r\\n  'Mario José Molina-Pasquel Henríquez: chemist',\\r\\n  'Mohammad Abdus Salam: physicist',\\r\\n  'Percy Lavon Julian: chemist',\\r\\n  'Subrahmanyan Chandrasekhar: astrophysicist'\\r\\n];\\r\\n```\\r\\n\\r\\n#### 2. people의 요소를 새로운 JSX 노드 배열인 listItems에 매핑한다.\\r\\n```js\\r\\nconst listItems = people.map(person =\u003e \u003cli\u003e{person}\u003c/li\u003e);\\r\\n```\\r\\n\\r\\n#### 3. ```\u003cul\u003e```로 래\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/react.png\",\"url\":\"/post/2024-06-18-1_7_Rendering_Lists\"},{\"slug\":\"2024-06-18-1_8_Keeping_Components_Pure\",\"title\":\"Keeping Components Pure\",\"date\":\"2024-06-17\",\"categories\":[\"javascript\",\"ReactJs\"],\"tags\":[\"javascript\",\"ReactJs\"],\"excerpt\":\"Keeping Components Pure 컴포넌트 순수하게 유지하기 순수성: 공식으로서의 컴포넌트 컴퓨터 과학에서 특히 함수형 프로그래밍의 세계에서는 순수 함수는 다음과 같은 특징을 지니고 있는 함수이다. 1. 자신의 일에 집중합니다. 함수가 호출되기 전에 존재했던 \",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## Keeping Components Pure\\r\\n\u003e 컴포넌트 순수하게 유지하기\\r\\n\u003cbr\u003e\\r\\n\\r\\n### 순수성: 공식으로서의 컴포넌트\\r\\n컴퓨터 과학에서(특히 함수형 프로그래밍의 세계에서는) 순수 함수는 다음과 같은 특징을 지니고 있는 함수이다.\\r\\n1. 자신의 일에 집중합니다. 함수가 호출되기 전에 존재했던 어떤 객체나 변수는 변경하지 않는다.\\r\\n2. 같은 입력, 같은 출력 같은 입력이 주어졌다면 순수함수는 같은 결과를 반환해야 한다.\\r\\n\\r\\n```js\\r\\n// 예시\\r\\nfunction double(number) {\\r\\n  return 2 * number;\\r\\n}\\r\\n```\\r\\n\u003e React는 이러한 컨셉 기반에 설계되었다.\u003cbr\u003e\\r\\n\u003e React는 작성되는 모든 컴포넌트가 순수 함수일 거라 가정한다.\\r\\n\u003cbr\u003e\\r\\n\\r\\n### 사이드 이펙트: 의도하지(않은) 결과 \\r\\nReact의 렌더링 과정은 항상 순수해야 한다.\u003cbr/\u003e\\r\\n컴포넌트는 \u003cb\u003e렌더링하기 전에 존재했던 객체나\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/react.png\",\"url\":\"/post/2024-06-18-1_8_Keeping_Components_Pure\"},{\"slug\":\"2024-06-18-1_9_Understanding_Your_UI_as_a_Tree\",\"title\":\"Understanding Your UI as a Tree\",\"date\":\"2024-06-17\",\"categories\":[\"javascript\",\"ReactJs\"],\"tags\":[\"javascript\",\"ReactJs\"],\"excerpt\":\"Understanding Your UI as a Tree 트리로서 UI 이해하기 트리로서의 UI 데이터와 UI를 그릴때 트리구조가 많이 사용된다. html → DOM css → CSSOM 모바일도 마찬가지로 계층구조를 트리로 만들어준다. React는 컴포넌트로부터 UI\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## Understanding Your UI as a Tree\\r\\n\u003e 트리로서 UI 이해하기\\r\\n\u003cbr\u003e\\r\\n\\r\\n### 트리로서의 UI\\r\\n데이터와 UI를 그릴때 트리구조가 많이 사용된다.\\r\\n- html → DOM\\r\\n- css → CSSOM \\r\\n\\r\\n모바일도 마찬가지로 계층구조를 트리로 만들어준다.\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n\u003cimg src=\\\"https://jayj-fe.github.io/blogAPI/assets/img/react/ui_tree.png\\\" alt=\\\"\\\" style=\\\"max-width:500px\\\"\u003e\\r\\n\\r\\n\u003e React는 컴포넌트로부터 UI 트리를 생성한다.\u003cbr\u003e\\r\\n\u003e 위 예제 그림은 UI 트리는 DOM을 렌더링하는 데 사용됩니다.\\r\\n\\r\\n\u003cbr\u003e\\r\\n브라우저와 모바일 플랫폼처럼 React도 React 앱의 컴포넌트 간의 관계를 관리하고 모델링하기 위해 트리 구조를 사용한다. \u003cbr\u003e\\r\\n\u003cb\u003e트리는 데이터가 흐르는 방식과 렌더링 및 앱 크기를 최적화하는 방법을 이해하는 데 유용한 도구\u003c/b\u003e이다.\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n##\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/react.png\",\"url\":\"/post/2024-06-18-1_9_Understanding_Your_UI_as_a_Tree\"},{\"slug\":\"2023-12-10-zustand\",\"title\":\"React의 상태관리 - Zustand\",\"date\":\"2023-12-10\",\"categories\":[\"javascript\",\"ReactJs\"],\"tags\":[\"javascript\",\"ReactJs\"],\"excerpt\":\"React의 상태관리 Zustand React에서 상태란 동적인 데이터이다. 동적인 데이터는 데이터의 값이 변경되면 렌더링에 영향을 주는 값 이라고 할 수 있다. 너무 잦은 상태의 변화는 잦은 렌더링이 이루어지기에 전체적인 성능저하가 일어날 수 있다. 또한 리액트는 단\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## React의 상태관리 - Zustand\\r\\nReact에서 상태란 동적인 데이터이다.\u003cbr\u003e\\r\\n동적인 데이터는 \u003cb\u003e데이터의 값이 변경되면 렌더링에 영향을 주는 값\u003c/b\u003e이라고 할 수 있다.\u003cbr\u003e\\r\\n\u003cbr\u003e\\r\\n너무 잦은 상태의 변화는 잦은 렌더링이 이루어지기에 전체적인 성능저하가 일어날 수 있다.\u003cbr\u003e\\r\\n또한 리액트는 단방향 바인딩으로, 부모 컴포넌트에서 자식 컴포넌트로만 state를 props로 전달할 수 있고, 반대로 부모 컴포넌트로 props를 직접 전달할 수는 없다.\u003cbr\u003e\\r\\n자식 컴포넌트에서 부모 컴포넌트에 있는 state를 변경하려면 setState를 props로 넘겨줘야 한다.\u003cbr\u003e\\r\\n코드 자체가 복잡해지고 상호 의존성이 많아져서 효율적이지 못하다.\u003cbr\u003e\\r\\n\u003cbr\u003e\\r\\n따라서 두 가지를 지키기 위하여 \u003cb\u003e상태관리\u003c/b\u003e가 필요하다.\\r\\n1. 데이터가 바뀌어도 페이지가 렌더링 되지 않게 하기 위해\\r\\n2. 상태(state)들이 복잡하게 얽혀\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/react.png\",\"url\":\"/post/2023-12-10-zustand\"},{\"slug\":\"2023-12-22-firebase\",\"title\":\"FireBase - 데이터베이스 이용하기\",\"date\":\"2023-12-10\",\"categories\":[\"javascript\",\"ReactJs\",\"Firebase\"],\"tags\":[\"javascript\",\"ReactJs\",\"Firebase\"],\"excerpt\":\"FireBase 데이터베이스 이용하기 FireBase 란? FireBase는 2014년도에 구글에서 인수한 모바일, 웹 애플리케이션 개발 플랫폼이다. Firebase는 데이터베이스, 인증, 스토리지, 원격 구성, 푸시 알람 등다양한 기능을 제공한다. FireBase 시\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## FireBase - 데이터베이스 이용하기\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n### FireBase 란?\\r\\nFireBase는 2014년도에 구글에서 인수한 모바일, 웹 애플리케이션 개발 플랫폼이다.\\r\\nFirebase는 데이터베이스, 인증, 스토리지, 원격 구성, 푸시 알람 등다양한 기능을 제공한다.\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n### FireBase 시작하기\\r\\n1. \u003ca href=\\\"https://firebase.google.com/?hl=ko\\\" target=\\\"_blank\\\"\u003e공식사이트\u003c/a\u003e에 일단 가입해야한다.\\r\\n2. 공식사이트에서 로그인 후 console로 이동한다.\u003cbr\u003e\\r\\n\u003cimg src=\\\"https://jayj-fe.github.io/blogAPI/assets/img/firebase/firebase.png\\\" style=\\\"max-width:500px\\\" alt=\\\"\\\"\u003e\\r\\n\\r\\n3. 새 프로젝트를 추가한다.\u003cbr\u003e\\r\\n\u003cimg src=\\\"https://jayj-fe.github.io/blogAPI/assets/img/firebase/firebase2.png\\\" style=\\\"max-width:500p\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/firebase.png\",\"url\":\"/post/2023-12-22-firebase\"},{\"slug\":\"2023-10-30-iconFont\",\"title\":\"Icon Font란?\",\"date\":\"2023-10-30\",\"categories\":[\"html\",\"css\"],\"tags\":[\"html\",\"css\"],\"excerpt\":\"Icon Font란? 아이콘 폰트 icon font 란 문자/숫자 대신 아이콘 icon 과 심볼 symbol 로 채워진 \\\"폰트 파일\\\"이다. Icon Font 장점 Icon font는 vector 이미지로, image 보다 훨씬 가볍다. 글자 색상, 글자 크기 등 일반 \",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## Icon Font란?\\r\\n아이콘 폰트(icon font)란 문자/숫자 대신 아이콘(icon)과 심볼(symbol)로 채워진 \\\"폰트 파일\\\"이다.\\r\\n\\r\\n### Icon Font 장점\\r\\n- Icon font는 vector 이미지로, image 보다 훨씬 가볍다.\\r\\n- 글자 색상, 글자 크기 등 일반 텍스트와 같은 방식으로 CSS를 통해 간편하게 스타일링할 수 있다.\\r\\n\\r\\n### Icon Font 단점\\r\\n- 아이콘의 컬러로 한 가지 색상 또는 그라데이션만 설정할 수 있다. (일반 이미지처럼 부분마다 컬러 지정X)\\r\\n- 몇몇 스크린 리더는 Icon Font가 무엇인지 읽지 못한다.\\r\\n- 아이콘 폰트가 로드되지 않는 경우, 적당히 대체할 것이 없다.\\r\\n\\r\\n\u003cbr /\u003e\\r\\n\\r\\n## Icon Font 사용법\\r\\nSVG 이미지를 Icon Font로 변환해주는 사이트를 이용해야한다.\\r\\n\u003e \u003ca href=\\\"https://icomoon.io/app/#/select\\\" target\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/css.png\",\"url\":\"/post/2023-10-30-iconFont\"},{\"slug\":\"2023-09-12-NextJs\",\"title\":\"React 프레임워크 - Next.js\",\"date\":\"2023-09-12\",\"categories\":[\"javascript\",\"ReactJs\",\"NextJs\"],\"tags\":[\"javascript\",\"ReactJs\",\"NextJs\"],\"excerpt\":\"Next.js는 React 라이브러리의 프레임워크이다. Pre Rendering, 서버 사이드 렌더링 Server Side Rendering SSR , App Router, Code Splitting 같은 다양하고 풍부한 기능을 제공한다. React는 클라이언트 사이드\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\nNext.js는 React 라이브러리의 프레임워크이다.\u003cbr\u003e\\r\\nPre-Rendering, 서버 사이드 렌더링(Server Side Rendering - SSR), App Router, Code Splitting  같은 다양하고 풍부한 기능을 제공한다.\u003cbr\u003e\\r\\n\u003cbr\u003e\\r\\nReact는 클라이언트 사이드 렌더링(Client Side Rendering - CSR)으로 Search Engine Optimization(SEO)의 대응이 미흡하다.\u003cbr\u003e\\r\\n그래서 \u003cb\u003eSEO를 대응하기 위해서 SSR 을 지원하는 Next.js를 사용\u003c/b\u003e한다고 많은 포스트에서 작성하고 있다.\\r\\n\\r\\n## Next.js가 제공하는 기능들.\\r\\n\\r\\n### Pre-Rendering\\r\\n\\r\\n기본적으로 Next.js는 Static-Site Generate(SSG)와 Server Side Rendering(SSR)을 제공한다.\u003cbr\u003e\\r\\n\u003cbr\u003e\\r\\n두 가지 렌더링 호출 방식의 공통점은 \u003cb\u003eHTM\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/nextjs.png\",\"url\":\"/post/2023-09-12-NextJs\"},{\"slug\":\"2023-08-25-AstroJs\",\"title\":\"Astro.js\",\"date\":\"2023-08-25\",\"categories\":[\"astroJs\"],\"tags\":[\"astroJs\"],\"excerpt\":\"최근 회사에서 Astro.js를 도입하였다. Astro.js가 무엇인 지 앞서 왜 Astro.js를 도입하려고 했는 지 적으려고 한다. 도입 전 시스템 기존의 개발 도구 Grunt 는 빌드의 속도가 느려 Front End 개발 속도를 저하시키고, 또한 퍼블리싱 HTML\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n최근 회사에서 Astro.js를 도입하였다.\u003cbr\u003e\\r\\nAstro.js가 무엇인 지 앞서 왜 Astro.js를 도입하려고 했는 지 적으려고 한다.\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n\u003chr\u003e\\r\\n\u003cbr\u003e\\r\\n\\r\\n## 도입 전 시스템\\r\\n기존의 개발 도구(Grunt)는 빌드의 속도가 느려 Front End 개발 속도를 저하시키고, 또한 퍼블리싱(HTML, CSS)와 운영(JSP) 소스를 따로 관리하여 버전 관리의 어려움이 있었다.\u003cbr\u003e\\r\\n\u003cbr\u003e\\r\\n또한 퍼블리싱과 운영 담당자가 다름으로 오류 발생 시 원인 분석 시간이 늘어나고, 책임 소재가 불명확하며, 간단한 수정 사항(HTML, CSS)도 퍼블리싱(Front End), 운영(Back End) 담당자가 각각 투입되어 불필요한 인력 자원 사용하는 구조적인 문제점이 있었다.\u003cbr\u003e\\r\\n\\r\\n\u003cimg src=\\\"https://jayj-fe.github.io/blogAPI/assets/img/astro/astro_system.png\\\" style=\\\"max-width:500px\\\" alt=\\\"\\\"\u003e\\r\\n\\r\\n#\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/astrojs.png\",\"url\":\"/post/2023-08-25-AstroJs\"},{\"slug\":\"2023-07-20-googleSheetsAPI\",\"title\":\"Google Sheets API\",\"date\":\"2023-07-20\",\"categories\":[\"javascript\"],\"tags\":[\"javascript\"],\"excerpt\":\"최근 회사 업무로 Google Sheets API를 사용하였다. 이전까지 데이터를 관리, 연동 개발은 DateBase DB 만 생각하었는데, DB구축을 하지 않고 간단하게 데이터를 저장하고 연동하여 활용할 수 있었다. 개인적으로 간단하고 편하게 사용할 수 있었기에 정보\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n최근 회사 업무로 Google Sheets API를 사용하였다.\u003cbr\u003e\\r\\n이전까지 데이터를 관리, 연동 개발은 DateBase(DB)만 생각하었는데,\u003cbr\u003e\\r\\nDB구축을 하지 않고 간단하게 데이터를 저장하고 연동하여 활용할 수 있었다.\u003cbr\u003e\\r\\n\u003cbr\u003e\\r\\n개인적으로 간단하고 편하게 사용할 수 있었기에 정보를 공유하고 작성한다.\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n\u003chr\u003e\\r\\n\u003cbr\u003e\\r\\n\\r\\n## Google Sheets API\\r\\nGoogle Sheets API를 사용하기 위해서는 Google Sheets를 생성해줘야한다.\u003cbr\u003e\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n### Google Sheets 생성하기.\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n1. Google 메인 화면에서 상단의 메뉴 \u003e 드라이브를 눌러준다.\\r\\n\\r\\n\u003cimg src=\\\"https://jayj-fe.github.io/blogAPI/assets/img/javascript/google_sheet_creat.png\\\" alt=\\\"\\\"\u003e\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n2. 본인의 드라이브로 접속이 되었다면, 좌측 상단에 신규\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/javaScript.png\",\"url\":\"/post/2023-07-20-googleSheetsAPI\"},{\"slug\":\"2023-07-10-React_MUI\",\"title\":\"React_MUI\",\"date\":\"2023-07-10\",\"categories\":[\"javascript\",\"ReactJs\",\"MUI\",\"css\"],\"tags\":[\"javascript\",\"ReactJs\",\"MUI\",\"css\"],\"excerpt\":\"MUI란 MUI Material UI 는 Material Design을 구현해놓은 라이브러리이다. 이 라이브러리를 이용하면 material 디자인 스타일이 적용된 UI를 매우 쉽게 구현할 수 있다. Material Design이란? 구글은 모바일과 데스크탑 그리고 그 \",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## MUI란\\r\\nMUI(Material UI)는 Material Design을 구현해놓은 라이브러리이다.\u003cbr\u003e\\r\\n이 라이브러리를 이용하면 material 디자인 스타일이 적용된 UI를 매우 쉽게 구현할 수 있다. \u003cbr\u003e\\r\\n\u003cbr\u003e\\r\\n\\r\\n### Material Design이란?\\r\\n구글은 모바일과 데스크탑 그리고 그 외 다양한 디바이스들을 아우르는 하나의 일관된 디자인 가이드라인을 공개하였는데, 이것이 바로 \u003cb\u003eMaterial Design\u003c/b\u003e이다.\u003cbr\u003e\\r\\n\u003cbr\u003e\\r\\n머티리얼 디자인은 질감이 느껴지는 표면 (tactile surfaces) 과 대담하고 선명한 그래픽 디자인 (bold graphic design), 그리고 아름답고 직관적인 사용자 경험을 위한 자연스러운 애니메이션을 특징으로 한다.\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## MUI 설치하기\\r\\nMUI는 npm, yarn 등으로 설치할 수 있다.\\r\\n\\r\\n```js\\r\\n// npm\\r\\nnpm install @mui/\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/mui.png\",\"url\":\"/post/2023-07-10-React_MUI\"},{\"slug\":\"2023-03-07-Reactjs\",\"title\":\"React란?\",\"date\":\"2023-03-07\",\"categories\":[\"javascript\",\"ReactJs\"],\"tags\":[\"javascript\",\"ReactJs\"],\"excerpt\":\"React.js 란 무엇인가? React.js의 공식문서에서는 '사용자 인터페이스를 만들기 위한 JavaScript 라이브러리' 라고 설명하고 있다. 즉, 보여지는 화면을 만드는 자바스크립트 프레임워크 중의 하나이다. React.js 공식사이트 장점 및 특징 1. Co\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## React.js 란 무엇인가?\\r\\nReact.js의 공식문서에서는 \u003cb\u003e'사용자 인터페이스를 만들기 위한 JavaScript 라이브러리'\u003c/b\u003e 라고 설명하고 있다.\u003cbr\u003e\\r\\n즉, 보여지는 화면을 만드는 자바스크립트 프레임워크 중의 하나이다.\u003cbr\u003e\\r\\n\\r\\n\u003e \u003ca href=\\\"https://ko.legacy.reactjs.org/\\\" target=\\\"_blank\\\"\u003eReact.js 공식사이트\u003c/a\u003e\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## 장점 및 특징\\r\\n1. Component 기반 구조\\r\\n2. Data Flow\\r\\n3. Virtual Dom\\r\\n4. JSX\\r\\n\\r\\n\u003cBr\u003e\\r\\n\\r\\n### Component 기반 구조\\r\\n\\r\\nVue.js 에서 한번 설명했던 구조이다.\u003cbr\u003e\\r\\nDOM을 작은 단위로 쪼개어 개발하는 방식으로 유지보수와 재사용성이 높다.\u003cbr\u003e\\r\\n\u003cbr\u003e\\r\\n작은 단위로 쪼개져 있는 Dom 하나를 Component라 부르며, 독립된 Component들을 조립해 화면을 구성한다\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/react.png\",\"url\":\"/post/2023-03-07-Reactjs\"},{\"slug\":\"2023-01-15-jsAndCssAnimation\",\"title\":\"Javascript and CSS Animation\",\"date\":\"2023-01-15\",\"categories\":[\"css\"],\"tags\":[\"css\"],\"excerpt\":\"브라우저에서 애니메이션 효과를 사용하기 위해서는 두 가지의 방법을 사용할 수 있습니다. CSS의 transition / animation 속성과 Javascript의 setInterval / requestAnimationFrame 함수를 사용할 수 있습니다. CSS 애\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n브라우저에서 애니메이션 효과를 사용하기 위해서는 두 가지의 방법을 사용할 수 있습니다. \u003cbr\u003e\\r\\nCSS의 \u003cb style=\\\"color:skyblue\\\"\u003etransition / animation\u003c/b\u003e 속성과 \u003cbr\u003e\\r\\nJavascript의 \u003cb style=\\\"color:#D7DF01\\\"\u003esetInterval / requestAnimationFrame \u003c/b\u003e 함수를 사용할 수 있습니다.\u003cbr\u003e\\r\\n\u003cbr\u003e\\r\\n\u003cbr\u003e\\r\\n\\r\\n\u003chr\u003e\\r\\n\u003cbr\u003e\\r\\n\\r\\n## CSS 애니메이션\\r\\n\\r\\nCSS 애니메이션은 Javascript 애니메이션보다 좀 더 간단한 애니메이션을 구현하고 처리하는데 사용합니다.\u003cbr\u003e\\r\\ntransform의 translate를 사용하여 애니메이션을 구현하면 Javascript로 애니메이션을 구현하는 것보다 성능을 개선할 수 있습니다.\u003cbr\u003e\\r\\nJavascript의 경우 top, left등의 속성 값을 변화시키면 랜더링 과정에서 \u003cb style=\\\"color:\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/css.png\",\"url\":\"/post/2023-01-15-jsAndCssAnimation\"},{\"slug\":\"2022-12-12-doble_ExclamationMarks\",\"title\":\"느낌표 두개 연산자 - Double Exclamation Marks Operator\",\"date\":\"2022-12-12\",\"categories\":[\"javascript\"],\"tags\":[\"javascript\"],\"excerpt\":\"라이브러리를 사용하기 위하여 분석하다가 !! 연산자를 사용한 것을 본 적이 있다. 어떤 동작을 하는 연산자인지 검색해보고 알게된 내용을 정리하려고 한다. NOT 연산자인 느낌표 and 느낌표 두개 !! 연산자 js console.log \\\"str\\\" // \\\"str\\\" con\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n라이브러리를 사용하기 위하여 분석하다가 !! 연산자를 사용한 것을 본 적이 있다.\u003cbr\u003e\\r\\n어떤 동작을 하는 연산자인지 검색해보고 알게된 내용을 정리하려고 한다.\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## NOT 연산자인 (느낌표) and 느낌표 두개(!!) 연산자\\r\\n\\r\\n```js\\r\\nconsole.log(\\\"str\\\")      // \\\"str\\\"\\r\\nconsole.log(!(\\\"str\\\"))   //false\\r\\nconsole.log(!!(\\\"str\\\"))  //true\\r\\n\\r\\nconsole.log(\\\"\\\")         //\\\"\\\"\\r\\nconsole.log(!(\\\"\\\"))      //true\\r\\nconsole.log(!!(\\\"\\\"))     //false\\r\\n\\r\\nconsole.log(true)       //true\\r\\nconsole.log(!true)      //false\\r\\nconsole.log(!!true)     //true\\r\\n\\r\\nconsole.log(false)      //false\\r\\nconsol\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/javaScript.png\",\"url\":\"/post/2022-12-12-doble_ExclamationMarks\"},{\"slug\":\"2022-11-10-closure\",\"title\":\"클로져란 ?\",\"date\":\"2022-11-10\",\"categories\":[\"javascript\"],\"tags\":[\"javascript\"],\"excerpt\":\"클로져란 클로저는 함수와 함수가 선언된 어휘적 환경의 조합이다. 클로저를 이해하려면 자바스크립트가 어떻게 변수의 유효범위를 지정하는지 Lexical scoping 를 먼저 이해해야 한다. MDN 출처 스코프 자바스크립트의 스코프는 범위를 뜻한다. scope a 함수에서\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## 클로져란\\r\\n\\r\\n클로저는 함수와 함수가 선언된 어휘적 환경의 조합이다.\u003cbr\u003e\\r\\n클로저를 이해하려면 자바스크립트가 어떻게 변수의 유효범위를 지정하는지(Lexical scoping)를 먼저 이해해야 한다.\\r\\n\u003e MDN 출처\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## 스코프\\r\\n\\r\\n자바스크립트의 스코프는 범위를 뜻한다.\u003cbr\u003e\\r\\n\\r\\n```js\\r\\nfunction scope_a(){\\r\\n\\tconst consoleData = 'a';\\r\\n\\r\\n\\tfunction scope_b(){\\r\\n\\t\\tconst consoleData = 'b';\\r\\n\\r\\n\\t\\tconsole.log(consoleData); // b\\r\\n\\t}\\r\\n\\r\\n\\tscope_b();\\r\\n\\tconsole.log(consoleData); // a\\r\\n}\\r\\n\\r\\nscope_a();\\r\\n```\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\nscope_a 함수에서 consoleData 변수에 값 'a'를 넣었고,\u003cbr\u003e\\r\\nscope_b 함수에서 consoleData 변수에 값 'b'를\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/javaScript.png\",\"url\":\"/post/2022-11-10-closure\"},{\"slug\":\"2022-10-21-WebComponent\",\"title\":\"Web Component\",\"date\":\"2022-10-21\",\"categories\":[\"html\",\"javascript\"],\"tags\":[\"html\",\"javascript\"],\"excerpt\":\"최근 어플리케이션 시장이 점점 커지고 복잡해지면서 컴포넌트 기반의 프레임워크들이 등장하였다. 복잡한 소프트웨어들을 간단한 부분들로 나눠서 개발하는 방식으로 대표적으로 React, Vue, Angluar등의 자바스크립트 프레임워크들이 있다 최근에는 자바스크립트의 프레임워\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n최근 어플리케이션 시장이 점점 커지고 복잡해지면서 컴포넌트 기반의 프레임워크들이 등장하였다.\u003cbr\u003e\\r\\n복잡한 소프트웨어들을 간단한 부분들로 나눠서 개발하는 방식으로 대표적으로 React, Vue, Angluar등의 자바스크립트 프레임워크들이 있다\u003cbr\u003e\\r\\n\\r\\n최근에는 자바스크립트의 프레임워크이 인기가 많아지면서 관심을 받고 있는데\u003cbr\u003e\\r\\n그 기반인 웹 컴포넌트에 대해서 알아보려고 한다.\\r\\n\\r\\n## Web Component란\\r\\n\\r\\n컴포넌트(Component)란 기능을 다른 코드로부터 분리된 재사용이 가능한 독립적인 모듈을 뜻한다.\u003cbr\u003e\\r\\n컴포넌트 기반 프로그래밍을 하면 마치 레고 블록처럼 이미 만들어진 컴포넌들을 조합하여 화면을 구성할 수 있다.\u003cbr\u003e\\r\\n\\r\\n\u003cimg src=\\\"https://jayj-fe.github.io/blogAPI/assets/img/html/webComponent.jpg\\\" alt=\\\"\\\"\u003e\\r\\n\\r\\n\u003cbr\u003e\\r\\n웹 컴포넌트는 이러한 컴포넌트 기반 프로그래밍을 웹에서도 적용할 수 있도록 W3C에서 새\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/html.png\",\"url\":\"/post/2022-10-21-WebComponent\"},{\"slug\":\"2022-09-04-SeoUsedInVue\",\"title\":\"Vue에서 사용하는 SEO\",\"date\":\"2022-09-04\",\"categories\":[\"html\",\"VueJs\"],\"tags\":[\"html\",\"vue.js\"],\"excerpt\":\"최근 들어 SPA로 구현된 사이트가 증가하고 있다. 하지만 SPA 검색엔진에 잘 노출이 되지 않아 사이트에 많은 사람들이 방문하지 못하는 문제들이 생기고 있다. SPA에서의 SEO는 어떻게 해결하는 지 포스팅하려고 한다. MPA와 SPA의 차이 SEO를 어떻게 해결하는\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n최근 들어 SPA로 구현된 사이트가 증가하고 있다.\u003cbr\u003e\\r\\n하지만 SPA 검색엔진에 잘 노출이 되지 않아 사이트에 많은 사람들이 방문하지 못하는 문제들이 생기고 있다.\u003cbr\u003e\\r\\nSPA에서의 SEO는 어떻게 해결하는 지 포스팅하려고 한다.\\r\\n\\r\\n## MPA와 SPA의 차이\\r\\n\\r\\nSEO를 어떻게 해결하는 방법이 있는 지 알아보기 전에, MPA와 SPA에 대해서 알아야한다.\\r\\n\\r\\n## MPA\\r\\n\\r\\nMPA(Multiple Page Application)는 여러 개(Multiple)의 Page로 구성된 Application이다.\u003cbr\u003e\\r\\n전통적인 방식으로 페이지를 요청할 때마다 정적 리소스가 다운로드된다. \u003cb\u003e매번 전체 페이지가 다시 렌더링\u003c/b\u003e 된다.\u003cbr\u003e\\r\\nMPA를 SSR(Server Side Rendering) 방식으로 렌더링한다고 말한다.\u003cbr\u003e\\r\\n\u003cbr\u003e\\r\\n\\r\\n\u003cimg src=\\\"https://jayj-fe.github.io/blogAPI/assets/img/html/MPA.webp\\\" alt=\\\"\\\"\u003e\\r\\n\u003e MP\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/vuejs.png\",\"url\":\"/post/2022-09-04-SeoUsedInVue\"},{\"slug\":\"2022-08-16-AdaptiveWebAndResponsiveWeb\",\"title\":\"'적응형 웹'과 '반응형 웹'\",\"date\":\"2022-08-16\",\"categories\":[\"html\"],\"tags\":[\"html\"],\"excerpt\":\"'적응형 웹'과 '반응형 웹' 이란? 1. 적응형 웹 : 각각의 디바이스 별로 독립적인 템플릿 Templete 으로 랜딩되는 웹. 2. 반응형 웹 : 하나의 템플릿 Templete 로 모바일 , 태블릿, 데스크탑 모든 기기에 대응할 수 있는 웹. 적응형 웹 Adapti\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## '적응형 웹'과 '반응형 웹' 이란?\\r\\n\\r\\n1. \u003cb\u003e적응형 웹 : \u003c/b\u003e 각각의 디바이스 별로 독립적인 템플릿(Templete)으로 랜딩되는 웹.\\r\\n2. \u003cb\u003e반응형 웹 : \u003c/b\u003e 하나의 템플릿(Templete)로 모바일 , 태블릿, 데스크탑 모든 기기에 대응할 수 있는 웹.\\r\\n\\r\\n\u003cbr\u003e\\r\\n\u003chr\u003e\\r\\n\u003cbr\u003e\\r\\n\\r\\n## 적응형 웹 ( Adaptive Web )\\r\\n\\r\\n\u003cb\u003e'각각의 디바이스 별로 독립적인 템플릿(Templete)으로 랜딩되는 웹'\u003c/b\u003e\\r\\n\u003cbr\u003e\\r\\n각각의 디바이스별(Pc, Mobile)로 템플릿을 제작해야하며, 사용자가 url로 접속시 어떤 디바이스로 접속했는지 파악하여 디바이스별로 랜딩시켜준다.\u003cbr\u003e\\r\\n예를들어 PC로 접속하면 PC URL로 랜딩되고, Mobile로 접속시 Mobile URL을 랜딩시켜준다.\\r\\n\\r\\n\u003cimg src=\\\"https://jayj-fe.github.io/blogAPI/assets/img/html/Adaptive.gif\\\" alt=\\\"\\\" style=\\\"max-widt\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/html.png\",\"url\":\"/post/2022-08-16-AdaptiveWebAndResponsiveWeb\"},{\"slug\":\"2022-07-14-DOMRendering\",\"title\":\"브라우저의 동작원리\",\"date\":\"2022-07-14\",\"categories\":[\"html\"],\"tags\":[\"html\"],\"excerpt\":\"최근 HTML 파일은 어떻게 브라우저에 그려지는지 질문을 받은 적이 있다. Vue를 공부하면서 브라우저의 동작원리에 대해서 잠깐 다룬적이 있었으나, 정확히 알고 있지 않아서 답변을 할 수 없었고 이번 기회에 브라우저 렌더링 과정에 대해서 공부하고 정리해보려고 한다. 브\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n최근 HTML 파일은 어떻게 브라우저에 그려지는지 질문을 받은 적이 있다.\u003cbr\u003e\\r\\nVue를 공부하면서 브라우저의 동작원리에 대해서 잠깐 다룬적이 있었으나,\u003cbr\u003e\\r\\n정확히 알고 있지 않아서 답변을 할 수 없었고 이번 기회에 브라우저 렌더링 과정에 대해서 공부하고 정리해보려고 한다.\\r\\n\\r\\n## 브라우저 렌더링 동작 과정\\r\\n\\r\\n주소창에 url을 입력하고 접속하였을 때 브라우저는 해당 페이지에 대한 리소스를 서버에 요청한다.\u003cbr\u003e\\r\\n그 이후 브라우저의 렌더링 동작 과정은 5가지로 나눌 수 있다.\\r\\n\\r\\n1. Parsing\\r\\n2. Render Tree\\r\\n3. Layout\\r\\n4. Paint\\r\\n5. Composite\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n\u003cimg src=\\\"https://jayj-fe.github.io/blogAPI/assets/img/vue/webkitflow.png\\\" alt=\\\"\\\"\u003e\\r\\n\u003e 브라우저의 동작 순서\\r\\n\\r\\n### 1. Parsing\\r\\n\\r\\n서버에서 받아온 리소스(HTML, CSS)의 문자는 브라우저가 바로 인식하지 못\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/html.png\",\"url\":\"/post/2022-07-14-DOMRendering\"},{\"slug\":\"2022-05-24-BoxModel\",\"title\":\"Box Model\",\"date\":\"2022-05-24\",\"categories\":[\"html\",\"css\"],\"tags\":[\"html\",\"css\"],\"excerpt\":\"Box Model이란? 모든 HTML 요소는 박스 box 모양으로 구성되며, 이것을 박스 모델 box model 이라고 부른다. 박스 모델은 HTML 요소를 패딩 padding , 테두리 border , 마진 margin , 그리고 내용 content 으로 구분한다. \",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## Box Model이란?\\r\\n\\r\\n모든 HTML 요소는 박스(box) 모양으로 구성되며, 이것을 박스 모델(box model)이라고 부른다.\\r\\n박스 모델은 HTML 요소를 패딩(padding), 테두리(border), 마진(margin), 그리고 내용(content)으로 구분한다.\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## 웹 브라우저에서의 Box Model은?\\r\\n\\r\\n웹 브라우저에서의 Box Model은 content-box 와 border-box 기준이 있다.\\r\\ncontent-box는 콘텐츠 영역을 기준으로 크기를 정하며 border-box는 테두리 영역을 기준으로 크기를 정한다.\\r\\nCSS의 속성을 통하여 Box Model의 기준을 정할 수 있다.\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## CSS 문법\\r\\n\\r\\n```css\\r\\nbox-sizing: content-box | border-box | initial | inherit\\r\\n```\\r\\n\u003cbr\u003e\\r\\n\\r\\n- content-box : 콘텐트 영역을\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/html.png\",\"url\":\"/post/2022-05-24-BoxModel\"},{\"slug\":\"2022-05-06-DOCTYPE\",\"title\":\"DOCTYPE 이란?\",\"date\":\"2022-05-03\",\"categories\":[\"html\"],\"tags\":[\"html\"],\"excerpt\":\"DOCTYPE 란? 웹 문서에서 DTD 문서 유형 정의 를 통해서 현재 문서가 어떤 버전으로 기술되었는지 브라우저에 전달하는데 이것을 DOCTYPE 선언이라고 한다. DTD Document Type Definition 는 XHTML, HTML, HTML5 세 가지 유형\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## DOCTYPE 란?\\r\\n웹 문서에서 DTD(문서 유형 정의)를 통해서 현재 문서가 어떤 버전으로 기술되었는지 브라우저에 전달하는데 이것을 DOCTYPE 선언이라고 한다.\u003cbr\u003e\\r\\nDTD(Document Type Definition)는 XHTML, HTML, HTML5 세 가지 유형이 있으며, 선언된 문서 형식에 따라 마크업 속성을 처리하는 기준이 정해지고, 유효성 검사에 활용된다.\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## DOCTYPE 선언의 목적\\r\\n\\r\\n웹 브라우저는 두 가지 렌더링 모드를 가지고 있는데 쿼크모드(Quirks mode)와 표준모드(Standard mode)이다.\u003cbr\u003e\\r\\n브라우저가 출력하고자 하는 문서가 최신이라면 표준모드로 렌더링하며, 오래된 문서라면 쿼크 모드로 렌더링 하게 된다.\u003cbr\u003e\\r\\n\u003cbr\u003e\\r\\n이 과정에서 어떤 유형의 문서인지 정의해주는 것이 DOCTYPE 선언이다.\\r\\nDOCTYPE을 생략할 경우, 브라우저마다 상이하게 보여지거나(크로스 브라\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/html.png\",\"url\":\"/post/2022-05-06-DOCTYPE\"},{\"slug\":\"2022-04-12-BEM\",\"title\":\"CSS의 BEM을 사용해보자\",\"date\":\"2022-04-12\",\"categories\":[\"css\"],\"tags\":[\"css\"],\"excerpt\":\"BEM이란? BEM은 CSS 네이밍 방법론 중 하나이다. HTML의 요소를 Block , Element , Modifier 세가지로 구분하여 클래스명을 작명하는 방법이다. BEM의 장점 목적과 기능을 직관적으로 알 수 있다. 재사용성이 높다. CSS만으로 구조를 알 수\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## BEM이란?\\r\\n\\r\\nBEM은 CSS 네이밍 방법론 중 하나이다.\u003cbr\u003e\\r\\nHTML의 요소를 \u003cb\u003eBlock\u003c/b\u003e, \u003cb\u003eElement\u003c/b\u003e, \u003cb\u003eModifier\u003c/b\u003e 세가지로 구분하여 클래스명을 작명하는 방법이다.\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## BEM의 장점\\r\\n\\r\\n- 목적과 기능을 직관적으로 알 수 있다.\\r\\n- 재사용성이 높다.\\r\\n- CSS만으로 구조를 알 수 있다.\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## Block\\r\\n\\r\\n### 의미\\r\\nBlock 은 단독으로 사용할 수 있는 \u003cb\u003e독립적인 요소\u003c/b\u003e이다.\u003cbr\u003e\\r\\n\u003cb\u003e재사용성이 가능\u003c/b\u003e하고 높은 요소이다.\u003cbr\u003e\\r\\n재사용을 위해서 Block 요소에는 \u003cb\u003ePadding과 Margin 속성을 적용하지 않는다.\u003c/b\u003e\\r\\n\\r\\n### HTML 구조\\r\\n\\r\\n```\\r\\n*** HTML ***\\r\\n\\r\\n\u003cheader\u003e\\r\\n    \u003cdiv\u003e\\r\\n        Logo\\r\\n    \u003c/div\u003e\\r\\n\\r\\n    \u003cnav\u003e\\r\\n        Nav\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/css.png\",\"url\":\"/post/2022-04-12-BEM\"},{\"slug\":\"2022-03-02-flex\",\"title\":\"CSS Flex\",\"date\":\"2022-03-02\",\"categories\":[\"css\"],\"tags\":[\"css\"],\"excerpt\":\"flex 는 레이아웃 구조를 잡을 수 있는 CSS 속성 중 하나이다. 컨테이너가 차지하는 공간에 맞춰서 아이템들이 유연하게 조절되기 때문에 레이아웃을 보다 쉽게 구현할 수 있다. Internet Explorer 이하 IE 점유율이 높고 하위 버전까지 맞춰야 할 예전에는\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\nflex 는 레이아웃 구조를 잡을 수 있는 CSS 속성 중 하나이다.\u003cbr\u003e\\r\\n컨테이너가 차지하는 공간에 맞춰서 아이템들이 유연하게 조절되기 때문에 레이아웃을 보다 쉽게 구현할 수 있다.\u003cbr\u003e\\r\\n\u003cbr\u003e\\r\\nInternet Explorer(이하 IE) 점유율이 높고 하위 버전까지 맞춰야 할 예전에는 하위 버전까지 지원하지 않아 잘 사용되지않았지만,\u003cbr\u003e 현재 IE의 점유율이 낮아지면서 너무 낮은 버전의 IE 브라우저는 안맞추는 추세로 프로젝트가 진행되면서 많이 사용되었다.\\r\\n\\r\\n\\r\\n## 구성\\r\\n\\r\\n\u003cimg src=\\\"https://jayj-fe.github.io/blogAPI/assets/img/css/flex_container.png\\\" alt=\\\"\\\"\u003e\\r\\n\\r\\nflex는 부모 요소인 flex container과 자식 요소인 flex item으로 구성되어 있다.\\r\\n\\r\\n```\\r\\n*** HTML *** \\r\\n\u003cdiv class=\\\"flex_container\\\"\u003e\\r\\n    \u003cdiv class=\\\"flex_item\\\"\u003eItem 1\u003c/d\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/css.png\",\"url\":\"/post/2022-03-02-flex\"},{\"slug\":\"2022-01-23-GitFetch\",\"title\":\"Git Fetch\",\"date\":\"2022-01-23\",\"categories\":[\"Git\"],\"tags\":[\"Git\"],\"excerpt\":\"이전 Git 도입에 대한 포스팅을 작성하고 Git을 사용하면서 commit, pull, push, merge 등의 자주 사용하는 명령어만 포스팅하고 사용하였다. 기존에 설명한 명령어 외에 Fetch에 대해서 포스팅하려고 한다. Fetch 원격 저장소에 저장 되어있는 소\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n이전 Git 도입에 대한 포스팅을 작성하고 Git을 사용하면서 commit, pull, push, merge 등의 자주 사용하는 명령어만 포스팅하고 사용하였다.\u003cbr\u003e\\r\\n기존에 설명한 명령어 외에 Fetch에 대해서 포스팅하려고 한다.\\r\\n\\r\\n## Fetch\\r\\n\\r\\n원격 저장소에 저장 되어있는 소스를 로컬 저장소로 가져오는 명령어이다.\u003cbr\u003e\\r\\n\u003cbr\u003e\\r\\n원격 저장소에서 소스를 가져오는 명령어는 Pull도 있다.\u003cbr\u003e\\r\\nPull과 Fetch의 차이는 병합(Merge)에 있다.\\r\\n\\r\\n- \u003cb\u003ePull : \u003c/b\u003e원격 저장소에서 소스를 가져와서 자동으로 병합한다.\\r\\n- \u003cb\u003eFetch : \u003c/b\u003e원격 저장소에서 소스를 가져오기만 한다.\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\nPull의 경우 자동으로 병합해주기 때문에 어떤 내용이 병합되었는 지 스스로 찾아서 확인해야한다.\u003cbr\u003e\\r\\nFetch의 경우 소스만 가져오기 때문에 변경된 내용을 한번에 확인할 수 있다.\u003cbr\u003e\\r\\n하지만 직접\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/git.png\",\"url\":\"/post/2022-01-23-GitFetch\"},{\"slug\":\"2022-01-12-GitIntroduction\",\"title\":\"Git 도입과 브랜치전략\",\"date\":\"2022-01-12\",\"categories\":[\"Git\"],\"tags\":[\"Git\"],\"excerpt\":\"Git 도입과 브랜치전략 사내에 소스 형상관리를 하고 있지않아, 소스가 날아가거나 백업파일을 만들어서 불필요한 용량을 차지한다거나 크고 작은 일들이 지속적으로 발생하였다. 그런 일들을 방지 및 해결하고자 Git을 도입하여 형상관리를 하기로 했다. 1. Git 도입하기.\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## Git 도입과 브랜치전략\\r\\n\\r\\n사내에 소스 형상관리를 하고 있지않아, 소스가 날아가거나 백업파일을 만들어서 불필요한 용량을 차지한다거나 크고 작은 일들이 지속적으로 발생하였다.\u003cbr\u003e\\r\\n그런 일들을 방지 및 해결하고자 Git을 도입하여 형상관리를 하기로 했다.\\r\\n\\r\\n- 1. Git 도입하기.\\r\\n- 2. Git 브런치전략.\\r\\n- 3. Git 도입 전과 후.\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## 1. Git 도입하기.\\r\\n어떤 플랫폼을 사용할 것인가에 대해서 무료로 사용하고 비공개로 소스를 관리하기 위하여 Gitlab을 선택하였다.\u003cbr\u003e\\r\\n\u003e \u003ca href=\\\"https://about.gitlab.com/\\\" target=\\\"blank\\\"\u003eGitlab 바로가기\u003c/a\u003e\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n### 1-1. git이란.\\r\\n\\r\\n형상 관리 도구 중 하나로써, 파일의 버전을 관리하는 시스템이다.\u003cbr\u003e\\r\\n\u003e 같은 형상 관리 도구로는 SVN이 있다.\u003cbr\u003e\\r\\n\\r\\nGit은 각각의 개발 P\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/git.png\",\"url\":\"/post/2022-01-12-GitIntroduction\"},{\"slug\":\"2021-11-20-VueInCI\",\"title\":\"CodeIgniter에 Vue 도입하기\",\"date\":\"2021-11-20\",\"categories\":[\"VueJs\"],\"tags\":[\"javascript\",\"vue.js\"],\"excerpt\":\"CodeIgniter에 Vue 도입하기 업계에서 Javascript의 프레임워크를 많이 사용하고 있어, 개인의 발전과 회사의 발전을 위해서 Vue.js를 도입해보기로 했다. 이 포스터
