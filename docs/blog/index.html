08-10-asyncAndawait\"},{\"slug\":\"2021-07-15-MapFilterReduceInES6\",\"title\":\"ES6의 Map Filter Reduce 함수들\",\"date\":\"2021-07-15\",\"categories\":[\"javascript\"],\"tags\":[\"javascript\"],\"excerpt\":\"ES6의 Map Filter Reduce 함수들 map, filter, reduce 함수 모두 ES6에서 추가된 함수로써, 배열 Array 에서 결과를 도출하고자 할 때 사용된다. 기존의 for문을 이용하여 loop 돌면서 결과를 도출했던 방식보다 유용하고 간결하게 사\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## ES6의 Map Filter Reduce 함수들\\r\\n\\r\\nmap, filter, reduce 함수 모두 ES6에서 추가된 함수로써, 배열(Array)에서 결과를 도출하고자 할 때 사용된다.\u003cbr\u003e\\r\\n기존의 for문을 이용하여 loop 돌면서 결과를 도출했던 방식보다 유용하고 간결하게 사용할 수 있을 것으로 생각하며,\u003cbr\u003e\\r\\n3개의 함수를 알아보고 정리하려고 한다.\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## Map\\r\\n\\r\\nmap() 메서드는 배열 내의 모든 요소 각각에 대하여 주어진 함수를 호출한 결과를 모아 새로운 배열을 반환한다.\\r\\n\\r\\n### 구문\\r\\n\\r\\n```js\\r\\narr.map(callback(currentValue[, index[, array]])[, thisArg])\\r\\n```\\r\\n\\r\\n### 사용법\\r\\n\\r\\n```js\\r\\nconst numbers = [1, 2, 3];\\r\\nconst doubles = numbers.map( (num) =\u003e num * 2 );\\r\\n\\r\\nconsol\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/javaScript.png\",\"url\":\"/post/2021-07-15-MapFilterReduceInES6\"},{\"slug\":\"2021-06-26-SSR\",\"title\":\"SSR(서버사이드 렌더링)과 CSR(클라이언트 사이드 렌더링)\",\"date\":\"2021-06-26\",\"categories\":[\"HTTP\"],\"tags\":[\"HTTP\"],\"excerpt\":\"SSR 인터넷을 사용하다 보면 내가 검색했던 키워드나 정보에 관련된 광고만 눈에 보인 적이 있을 것이다. 이는 기업에서 우리의 행동 정보를 저장하고 분석하여 활용하고 있기 때문이다. 개인 맞춤 광고를 하다보니 사생활 논란이 있어 현재는 개인 맞춤 광고는 중지 계획을 가\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## SSR\\r\\n\\r\\n인터넷을 사용하다 보면 내가 검색했던 키워드나 정보에 관련된 광고만 눈에 보인 적이 있을 것이다.\u003cbr\u003e\\r\\n이는 기업에서 우리의 행동 정보를 저장하고 분석하여 활용하고 있기 때문이다.\u003cbr\u003e\\r\\n\u003e 개인 맞춤 광고를 하다보니 사생활 논란이 있어 현재는 개인 맞춤 광고는 중지 계획을 가지고 있다.\u003cbr\u003e\\r\\n\u003e \\\"2021년 3월 3일 - 내년 4월까지 자사 웹브라우저 크롬 사용자의 개인 정보가 담긴 ‘쿠키(사용자가 특정 웹사이트에 접속할 때 자동으로 생성되는 파일)’를 분석하는 사업을 완전히 중단\\\"\\r\\n\\r\\n즉, \u003cb style=\\\"color:blue\\\"\u003e트래킹은 사용자의 행동 데이터를 수치로 나타내기 위해서 데이터를 수집하여 데이터 베이스에 저장하는 것\u003c/b\u003e이다.\u003cbr\u003e\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## 트래킹 분석\\r\\n\\r\\n저장된 정보를 가지고 웹 사이트 관리자는 웹 분석을 한다.\u003cbr\u003e\\r\\n분석을 통하여 사람들이 사이트를 사용하는 방법, 사람들이 좋아하는 것\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/http.png\",\"url\":\"/post/2021-06-26-SSR\"},{\"slug\":\"2021-06-05-Tracking\",\"title\":\"웹 추적 기술 - 웹 트래킹(Tracking)\",\"date\":\"2021-06-05\",\"categories\":[\"HTTP\"],\"tags\":[\"HTTP\"],\"excerpt\":\"트래킹 Tracking 인터넷을 사용하다 보면 내가 검색했던 키워드나 정보에 관련된 광고만 눈에 보인 적이 있을 것이다. 이는 기업에서 우리의 행동 정보를 저장하고 분석하여 활용하고 있기 때문이다. 개인 맞춤 광고를 하다보니 사생활 논란이 있어 현재는 개인 맞춤 광고는\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## 트래킹(Tracking)\\r\\n\\r\\n인터넷을 사용하다 보면 내가 검색했던 키워드나 정보에 관련된 광고만 눈에 보인 적이 있을 것이다.\u003cbr\u003e\\r\\n이는 기업에서 우리의 행동 정보를 저장하고 분석하여 활용하고 있기 때문이다.\u003cbr\u003e\\r\\n\u003e 개인 맞춤 광고를 하다보니 사생활 논란이 있어 현재는 개인 맞춤 광고는 중지 계획을 가지고 있다.\u003cbr\u003e\\r\\n\u003e \\\"2021년 3월 3일 - 내년 4월까지 자사 웹브라우저 크롬 사용자의 개인 정보가 담긴 ‘쿠키(사용자가 특정 웹사이트에 접속할 때 자동으로 생성되는 파일)’를 분석하는 사업을 완전히 중단\\\"\\r\\n\\r\\n즉, \u003cb style=\\\"color:blue\\\"\u003e트래킹은 사용자의 행동 데이터를 수치로 나타내기 위해서 데이터를 수집하여 데이터 베이스에 저장하는 것\u003c/b\u003e이다.\u003cbr\u003e\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## 트래킹 분석\\r\\n\\r\\n저장된 정보를 가지고 웹 사이트 관리자는 웹 분석을 한다.\u003cbr\u003e\\r\\n분석을 통하여 사람들이 사이트를 사용하는 방법, 사\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/http.png\",\"url\":\"/post/2021-06-05-Tracking\"},{\"slug\":\"2021-05-23-CookieVsSeccion\",\"title\":\"Cookie와 Session의 차이는 무엇일까\",\"date\":\"2021-05-23\",\"categories\":[\"HTTP\"],\"tags\":[\"javascript\",\"HTTP\"],\"excerpt\":\"쿠키 Cookie 사용자가 어떠한 웹 사이트를 방문할 경우 사용자의 컴퓨터에 저장하는 작은 기록 정보 파일이다. 사용자가 따로 요청하지 않아도 브라우저가 Request시에 Request Header를 넣어서 자동으로 서버에 전송한다. 사용자의 상태 정보를 로컬에 저장했\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## 쿠키(Cookie)\\r\\n\\r\\n사용자가 어떠한 웹 사이트를 방문할 경우 사용자의 컴퓨터에 저장하는 작은 기록 정보 파일이다.\u003cbr\u003e\\r\\n사용자가 따로 요청하지 않아도 브라우저가 Request시에 Request Header를 넣어서 자동으로 서버에 전송한다.\u003cbr\u003e\\r\\n사용자의 상태 정보를 로컬에 저장했다가 필요시 정보를 참조하거나 재사용 한다.\u003cbr\u003e\\r\\n사용자 인증이 유효한 시간을 명시할 수 있으며, 유효 시간이 정해지면 브라우저가 종료되어도 인증이 유지된다는 특징이 있다.\\r\\n\\r\\n### 쿠키의 구성 요소\\r\\n\\r\\n- 이름 : 각각의 쿠키를 구별하는 데 사용되는 이름\\r\\n- 값 : 쿠키의 이름과 관련된 값\\r\\n- 유효시간 : 쿠키의 유지시간\\r\\n- 도메인 : 쿠키를 전송할 도메인\\r\\n- 경로 : 쿠키를 전송할 요청 경로\\r\\n\\r\\n### 쿠키 특징\\r\\n\\r\\n- 이름, 값, 만료일(저장 기간 설정), 경로 정보로 구성되어 있다.\\r\\n- 사용자마다 총 300개의 쿠키를 저장할 수 있다.\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/http.png\",\"url\":\"/post/2021-05-23-CookieVsSeccion\"},{\"slug\":\"2021-05-15-RESTfulAPI\",\"title\":\"RESTful API 이란\",\"date\":\"2021-05-15\",\"categories\":[\"HTTP\"],\"tags\":[\"HTTP\"],\"excerpt\":\"RESTful API란? REST를 기반 API를 의미합니다. REST은 무엇인지, REST API는 무엇인지, RESTful API는 무엇인지 알아보려고합니다. 1. RESTful API에서 REST 란? REST는 Representational State Trans\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## RESTful API란?\\r\\n\\r\\nREST를 기반 API를 의미합니다.\u003cbr\u003e\\r\\nREST은 무엇인지, REST API는 무엇인지, RESTful API는 무엇인지 알아보려고합니다.\\r\\n\\r\\n\u003cbr\u003e\\r\\n\u003chr\u003e\\r\\n\u003cbr\u003e\\r\\n\\r\\n## 1. RESTful API에서 REST 란?\\r\\n\\r\\nREST는 \u003cspan style=\\\"color:blue\\\"\u003eRepresentational State Transfer\u003c/span\u003e의 약자로써 풀어서 설명하자면\u003cbr\u003e\\r\\n\u003cspan style=\\\"color:red\\\"\u003e자원을 이름으로 구분해 해당 자원의 상태를 주고 받는 것\u003c/span\u003e을 말한다.\u003cbr\u003e\\r\\n\u003cbr\u003e\\r\\n\u003cb\u003e웹에 존재하는 자원(이미지, 동영상, DB)에 대한 CRUD 요청을,\u003cbr\u003e\\r\\n고유한 URI(Resource와 Method)로 표현하여 특정한 형태로 전달하는 방법이다.\u003c/b\u003e\\r\\n\u003e \u003cb\u003e CRUD : Create, Read, Update, Delete \u003c/b\u003e \u003cBr\u003e\\r\\n\u003e\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/restapi.png\",\"url\":\"/post/2021-05-15-RESTfulAPI\"},{\"slug\":\"2021-05-01-Axios\",\"title\":\"통신을 위한 라이브러리, Axios\",\"date\":\"2021-05-02\",\"categories\":[\"VueJs\",\"axios\"],\"tags\":[\"javascript\",\"axios\",\"HTTP\"],\"excerpt\":\"\u0026nbsp; \\\"Axios는 브라우저, Node.js를 위한 Promise API를 활용하는 HTTP 비동기 통신 라이브러리입니다.\\\" Axios 공식문서에 나와 있는 Axios의 정의이다. 자바스크립트의 Fetch API와 비슷한 기능을 가지고 있다. axios vs f\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## \u0026nbsp;\\r\\n\\r\\n\u003cb\u003e\\\"Axios는 브라우저, Node.js를 위한 Promise API를 활용하는 HTTP 비동기 통신 라이브러리입니다.\\\"\u003c/b\u003e\u003cbr\u003e\\r\\n\u003cbr\u003e\\r\\nAxios 공식문서에 나와 있는 Axios의 정의이다.\u003cbr\u003e\\r\\n자바스크립트의 Fetch API와 비슷한 기능을 가지고 있다.\\r\\n\\r\\n## axios vs fetch\\r\\n\\r\\n\u003cdiv class=\\\"table-wrapper\\\"\u003e\\r\\n  \u003ctable\u003e\\r\\n    \u003ctr\u003e\\r\\n      \u003ctd\u003e요청 객체에 URL을 가지고 있다.\u003c/td\u003e\\r\\n      \u003ctd\u003e요청 개체에 URL이 없다 .\u003c/td\u003e\\r\\n    \u003c/tr\u003e\\r\\n    \u003ctr\u003e\\r\\n      \u003ctd\u003e쉽게 설치할 수 있는 독립 실행형 타사 패키지 이다.\u003c/td\u003e\\r\\n      \u003ctd\u003e대부분의 최신 브라우저에 내장되어 있다.\u003cbr\u003e설치가 필요 없다.\u003c/td\u003e\\r\\n    \u003c/tr\u003e\\r\\n    \u003ctr\u003e\\r\\n      \u003ctd\u003e내장된 XSRF 보호 기능 있다.\u003c/td\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/axios.png\",\"url\":\"/post/2021-05-01-Axios\"},{\"slug\":\"2021-04-24-VueLifecycle\",\"title\":\"Vue Lifecycle 이해하기\",\"date\":\"2021-04-28\",\"categories\":[\"VueJs\"],\"tags\":[\"javascript\",\"vue.js\",\"VueLifecycle\"],\"excerpt\":\"Vue Lifecycle 이해하기 모든 Vue 앱은 Vue 함수로 새 Vue 인스턴스를 만드는 것부터 시작한다. Vue 인스턴스는 생성될 때, 일련의 초기화 단계를 거친다. 예를들어 아래와 같은 경우가 있다. 데이터 관찰 설정이 필요한 경우 템플릿을 컴파일 하는 경우 \",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## Vue Lifecycle 이해하기\\r\\n\\r\\n모든 Vue 앱은 Vue 함수로 새 Vue 인스턴스를 만드는 것부터 시작한다.\\r\\n\\r\\n```js\\r\\nvar vm = new Vue({\\r\\n  // 옵션\\r\\n})\\r\\n```\\r\\n\\r\\nVue 인스턴스는 생성될 때, 일련의 초기화 단계를 거친다.\u003cbr\u003e\\r\\n예를들어 아래와 같은 경우가 있다.\\r\\n\\r\\n- 데이터 관찰 설정이 필요한 경우\\r\\n- 템플릿을 컴파일 하는 경우\\r\\n- 인스턴스를 DOM에 마운트하는 경우\\r\\n- 데이터가 변경되어 DOM을 업데이트 하는 경우\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## 이미지로 보는 라이프 사이클\\r\\n\\r\\n\u003cimg src=\\\"https://jayj-fe.github.io/blogAPI/assets/img/vue/vue_lifecycle.png\\\" alt=\\\"\\\"\u003e\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## 1. Create 단계\\r\\n라이프 사이클 훅에서 제일 처음 실행되는 Create 단계이다.\u003cbr\u003e\\r\\nDOM이 생성되기 이전에 실행되는 훅으로써 DOM에 접근하거나 this.$el 을 사용하지 못한다.\u003cbr\u003e\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/vuejs.png\",\"url\":\"/post/2021-04-24-VueLifecycle\"},{\"slug\":\"2021-04-18-Vuex\",\"title\":\"Vuex가 무엇인가?\",\"date\":\"2021-04-18\",\"categories\":[\"VueJs\"],\"tags\":[\"javascript\",\"vue.js\",\"Vuex\"],\"excerpt\":\"Vuex가 무엇인가? Vue.js에 대한 상태 관리 패턴이자 라이브러리이다. 모든 컴포넌트에 대한 중앙 집중식 저장소 역할을 하며 예측 가능한 방식으로 상태를 변경할 수 있다. 상태 관리란? 간단한 Vue 코드로 확인해보겠다. 상태 State : 앱을 작동하는 소스이다\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## Vuex가 무엇인가?\\r\\n\\r\\nVue.js에 대한 상태 관리 패턴이자 라이브러리이다.\u003cbr\u003e\\r\\n모든 컴포넌트에 대한 중앙 집중식 저장소 역할을 하며 예측 가능한 방식으로 상태를 변경할 수 있다.\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## 상태 관리란?\\r\\n\\r\\n간단한 Vue 코드로 확인해보겠다.\\r\\n\\r\\n```js\\r\\nnew Vue({\\r\\n  // 상태\\r\\n  data () {\\r\\n    return {\\r\\n      count : 0\\r\\n    }\\r\\n  },\\r\\n  // 뷰\\r\\n  template : `\\r\\n    \u003cdiv\u003e {{ count }} \u003c/div\u003e\\r\\n  `,\\r\\n  // 액션\\r\\n  methods: {\\r\\n    increment () {\\r\\n      this.count++\\r\\n    }\\r\\n  }\\r\\n})\\r\\n```\\r\\n\\r\\n- 상태(State) : 앱을 작동하는 소스이다.\\r\\n- 뷰(View) : 상태를 보여주는 매핑이다.\\r\\n- 액션(Actions) : 사용자 입력에 대해 반응적으로 대응한다.\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/vuejs.png\",\"url\":\"/post/2021-04-18-Vuex\"},{\"slug\":\"2021-04-10-VueRouter\",\"title\":\"Vue Router 사용하기\",\"date\":\"2021-04-10\",\"categories\":[\"VueJs\"],\"tags\":[\"javascript\",\"vue.js\",\"vue Router\"],\"excerpt\":\"Vue Router 란 'Vue 라우터는 Vue.js opens new window 의 공식 라우터이며, Vue.js를 사용한 싱글 페이지 앱 SPA 을 쉽게 만들 수 있도록 Vue.js의 코어와 긴밀히 통합되어 있다.' 라고 공식문서에 설명되어있다. 싱글 페이지 앱 \",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## Vue Router 란\\r\\n\\r\\n'Vue 라우터는 Vue.js (opens new window)의 공식 라우터이며,\u003cbr\u003e\\r\\nVue.js를 사용한 싱글 페이지 앱(SPA)을 쉽게 만들 수 있도록 Vue.js의 코어와 긴밀히 통합되어 있다.'\u003cbr\u003e\\r\\n라고 공식문서에 설명되어있다.\u003cbr\u003e\\r\\n\u003cbr\u003e\\r\\n싱글 페이지 앱(SPA)는 최초에 한번 페이지를 로드하고 이후부터는 특정 부분만 변경하여 페이지를 보여주는 방식이다.\u003cbr\u003e\\r\\n\u003cbr\u003e\\r\\n기존의 웹 서비스는 서버로부터 데이터가 변경 및 페이지를 이동 할 때 화면 전체를 렌더링 하는 방식이였다.\u003cbr\u003e\\r\\nSPA를 사용함으로써 전체 페이지를 렌더링하는데 드는 오버헤드가 줄어들어 앱의 속도가 향상되어 더 빠른 속도를 사용자에게 제공할 수 있다.\u003cbr\u003e\\r\\n\u003cbr\u003e\\r\\n즉, Vue Router를 사용하면 \u003cb\u003e싱글 페이지 앱(SPA)을 만드는 데 필요한 URL 이동 및 특정 부분의 변경\u003c/b\u003e을 간단히 구현할 수 있다.\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/vuejs.png\",\"url\":\"/post/2021-04-10-VueRouter\"},{\"slug\":\"2021-03-14-VueCLI\",\"title\":\"Vue-CLI\",\"date\":\"2021-03-14\",\"categories\":[\"VueJs\"],\"tags\":[\"javascript\",\"vue.js\"],\"excerpt\":\"Vue CLI 란 Vue CLI은 Vue.js의 개발 환경을 쉽고 빠르게 구축할 수 있도록 도와주는 도구이다. cli를 이용하면, 짧은 시간내에 프로젝트의 환경을 설정할 수 있다. 사용자가 조금 더 개발에 집중할 수 있도록 도와준다. CLI란 Command Line I\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## Vue-CLI 란\\r\\n\\r\\nVue CLI은 Vue.js의 개발 환경을 쉽고 빠르게 구축할 수 있도록 도와주는 도구이다.\u003cbr\u003e\\r\\ncli를 이용하면, 짧은 시간내에 프로젝트의 환경을 설정할 수 있다.\u003cbr\u003e\\r\\n사용자가 조금 더 개발에 집중할 수 있도록 도와준다.\\r\\n\u003e CLI란 Command Line Interface의 약자로 터미널을 통해 사용자와 컴퓨터가 상호 작용하는 방식을 뜻한다.\u003cbr\u003e\\r\\n\u003e 즉, 작업 명령은 사용자가 툴바 키보드 등을 통해 문자열의 형태로 입력하며, 컴퓨터로부터의 출력 역시 문자열의 형태로 주어진다. - \u003ca href=\\\"https://ko.wikipedia.org/wiki/%EB%AA%85%EB%A0%B9_%EC%A4%84_%EC%9D%B8%ED%84%B0%ED%8E%98%EC%9D%B4%EC%8A%A4\\\" target=\\\"_blank\\\"\u003e위키백과\u003c/a\u003e\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## Vue CLI 구성요소\\r\\n\\r\\nVue CLI는 여러 패키지로\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/vuejs.png\",\"url\":\"/post/2021-03-14-VueCLI\"},{\"slug\":\"2021-03-05-whatIsVue.js\",\"title\":\"Vue.js란\",\"date\":\"2021-03-05\",\"categories\":[\"VueJs\"],\"tags\":[\"javascript\",\"vue.js\"],\"excerpt\":\"Vue.js 란 무엇인가? Vue.js의 공식문서에서는 '사용자 인터페이스를 만들기 위한 프로그레시브 프레임워크' 라고 설명하고 있다. 즉, 보여지는 화면을 만드는 자바스크립트 프레임워크 중의 하나이다. Vue.js는 진입장벽이 낮으며 쉽고 빠르게 개발을 할 수 있다는\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## Vue.js 란 무엇인가?\\r\\n\\r\\nVue.js의 공식문서에서는 \u003cb\u003e'사용자 인터페이스를 만들기 위한 프로그레시브 프레임워크'\u003c/b\u003e 라고 설명하고 있다.\u003cbr\u003e\\r\\n즉, 보여지는 화면을 만드는 자바스크립트 프레임워크 중의 하나이다.\u003cbr\u003e\\r\\nVue.js는 진입장벽이 낮으며 쉽고 빠르게 개발을 할 수 있다는 것이 가장 큰 장점으로 가지고 있다.\u003cbr\u003e\\r\\n\\r\\n\u003e \u003ca href=\\\"https://kr.vuejs.org/v2/guide/index.html\\\" target=\\\"_blank\\\"\u003eVue.js 공식사이트\u003c/a\u003e\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## 장점 및 특징\\r\\n\\r\\n### 학습곡선이 낮다.\\r\\n\\r\\nVue.js는 웹 개발을 단순화하고 정리하기 위해 개발된 대중적인 자바스크립트 프론트엔드 프레임워크이다.\u003cbr\u003e\\r\\n수많은 프로젝트에서 AngularJS를 사용하여 구글을 위해 작업하던 Evan You에 의해 개발되었다.\u003cbr\u003e\\r\\n웹 UI 개발(컴포넌트, 선언형 UI, 핫 리로딩\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/vuejs.png\",\"url\":\"/post/2021-03-05-whatIsVue.js\"},{\"slug\":\"2020-12-20-CORS\",\"title\":\"나를 괴롭히는 CORS\",\"date\":\"2020-12-20\",\"categories\":[\"html\"],\"tags\":[\"html\"],\"excerpt\":\"\u0026nbsp; 🚨 Access to XMLHttpRequest at 'http:// A ' from origin 'http:// B ' has been blocked by CORS policy : No 'Access Control Allow Origin' header \",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## \u0026nbsp;\\r\\n\\r\\n\u003e 🚨 Access to XMLHttpRequest at 'http:// [A] ' from origin 'http:// [B] ' has been blocked by CORS policy : No 'Access-Control-Allow-Origin' header is present on the requested resource.\\r\\n\\r\\n웹 프로젝트를 구축하거나 운영하다보면 한번씩은 나타나는 오류이다.\u003cbr\u003e\\r\\n그리고 생각보다 자주 나타나는 오류이기 때문에 누구나 한번쯤은 봤을거라고 생각한다.\u003cbr\u003e\\r\\n그렇기에 한번 자세히 알고 넘어가야겠다고 생각해서 정리한다.\u003cbr\u003e\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## 교차 출처 리소스 공유(Cross-Origin Resource Sharing, CORS)\\r\\n\\r\\nCORS는 Cross-Origin Resource Sharing의 약자로 교차 출저 리소스 공유이다.\u003cbr\u003e\\r\\n\u003cbr\u003e\\r\\n\u003ca href=\\\"https:\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/CORS.png\",\"url\":\"/post/2020-12-20-CORS\"},{\"slug\":\"2020-09-28-GetAndPost\",\"title\":\"GET과 POST 방식\",\"date\":\"2020-09-28\",\"categories\":[\"HTTP\"],\"tags\":[\"HTTP\"],\"excerpt\":\"\u0026nbsp; 웹 브라우저로 어떤 사이트에 접속한다고 했을 때, 사용자는 URL을 입력하여 접근한다. HTTP 프로토콜을 통하여 사용자는 요청을 보내고 서버는 그 요청에 맞게 응답한다. 그리고 그 요청의 방식에는 크게 2가지 방식이 있고 그것이 바로 GET방식과 POST\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## \u0026nbsp;\\r\\n\\r\\n웹 브라우저로 어떤 사이트에 접속한다고 했을 때, 사용자는 URL을 입력하여 접근한다.\u003cbr\u003e\\r\\nHTTP 프로토콜을 통하여 사용자는 요청을 보내고 서버는 그 요청에 맞게 응답한다.\u003cbr\u003e\\r\\n그리고 그 요청의 방식에는 크게 2가지 방식이 있고 그것이 바로 GET방식과 POST방식이다\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## GET\\r\\n\\r\\nGET 방식은 서버로부터 어떠한 정보를 조회하기 위해서 사용되는 방식이다.\u003cbr\u003e\\r\\nGET은 서버에게 요청할 때 URL에 요청을 담아 보낸다. \u003cbr\u003e\\r\\nURL의 끝에 ? 를 통하여 요청을 하는데 요청의 파라미터가 여러 개일 경우 \u0026을 이용하여 요청한다.\u003cbr\u003e\\r\\n\\r\\n```\\r\\nwww.test.com/test?id=value\u0026id2=value2\u0026id3=value3\\r\\n```\\r\\n\\r\\n요청의 파라미터는 키와 값의 형식으로 보낸다.\u003cbr\u003e\\r\\n위에 적은 url에서 키는 id이며, 값은 value으로 이루어진 문자열이다.\u003cbr\u003e\\r\\n\u003c\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/http.png\",\"url\":\"/post/2020-09-28-GetAndPost\"},{\"slug\":\"2020-08-25-VanillaJs\",\"title\":\"VanillaJs\",\"date\":\"2020-08-25\",\"categories\":[\"javascript\"],\"tags\":[\"javascript\",\"VanillaJs\"],\"excerpt\":\"Vanilla JS란? Vanilla JS 바닐라 자바스크립트 란 어떠한 프레임워크와 라이브러리가 적용되지 않은 날 것의 자바스크립트를 바닐라 자바스크립트라고 한다. 왜 Vanilla JS 사용하는 것인가 개인적인 생각이지만 배보다 배꼽이 커지는 상황도 많았던 것 같다\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## Vanilla JS란?\\r\\nVanilla JS(바닐라 자바스크립트)란 어떠한 프레임워크와 라이브러리가 적용되지 않은 날 것의 자바스크립트를 바닐라 자바스크립트라고 한다.\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## 왜 Vanilla JS 사용하는 것인가\\r\\n개인적인 생각이지만 배보다 배꼽이 커지는 상황도 많았던 것 같다.\u003cbr\u003e\\r\\njQuery라는 DOM을 컨트롤 하는데에 있어서 매우 뛰어난 라이브러리가 있다.\u003cbr\u003e\\r\\n하지만 특정한 곳에서 한번만 사용할 것인데 그를 위해 jQuery를 사용한다면 효율적인 면에서 떨어진다.\u003cbr\u003e\\r\\njQuery 또한 자바스크립트의 라이브러리이기 때문에 순수한 자바스크립트보다 속도면에서 성능이 떨어진다.\u003cbr\u003e\\r\\n\u003cbr\u003e\\r\\n또한 이전까지의 자바스크립트 버전은 DOM에 접근하려면 jQuery에 비해 길게 작성해야했기에 조금 더 편리한 jQuery를 개발하는 데 편하고 좋았다고 생각한다.\u003cbr\u003e\\r\\n\\r\\n```js\\r\\n// class가 item 인 요소\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/javaScript.png\",\"url\":\"/post/2020-08-25-VanillaJs\"},{\"slug\":\"2020-06-11-use_strict\",\"title\":\"자바스크립트 엄격모드?\",\"date\":\"2020-06-11\",\"categories\":[\"javascript\"],\"tags\":[\"javascript\"],\"excerpt\":\"자바스크립트 엄격모드란 ? ECMAScript 5 에서 소개되었다. 기본으로 우리 사용하는 자바스크립트는 \\\"느슨한모드 sloppy mode \\\" 라고 불리며 문법이나 살짝 벗어나는 오류 정도는 조용히 무시하고 작동되었다. \\\"엄격한 모드 strict mod \\\" 를 사용하면\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## 자바스크립트 엄격모드란 ?\\r\\n\\r\\nECMAScript 5 에서 소개되었다.\u003cbr\u003e\\r\\n기본으로 우리 사용하는 자바스크립트는 \u003cb\u003e\\\"느슨한모드(sloppy mode)\\\"\u003c/b\u003e라고 불리며\u003cbr\u003e\\r\\n문법이나 살짝 벗어나는 오류 정도는 조용히 무시하고 작동되었다.\u003cbr\u003e\\r\\n\u003cb\u003e\\\"엄격한 모드(strict mod)\\\"\u003c/b\u003e를 사용하면 조금 더 디테일하게 문법이나 오류를 잡아낸다.\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## 엄격모드를 사용하려면\\r\\n\\r\\n사용법은 간단하다. \u003cbr\u003e\\r\\n엄격모드를 사용하기 위해서는 스크립트를 작성하기 전 최상단에 '\\\"use strict\\\";'를 작성해준다\u003cbr\u003e\\r\\n\\r\\n```js\\r\\n\\r\\n'use strict';\\r\\n\\r\\nfunction A(){\\r\\n  ...\\r\\n}\\r\\n\\r\\nvar b = 'hi';\\r\\n\\r\\n```\\r\\n\\r\\n## 무엇이 다른가\\r\\n\\r\\n엄격모드를 설명하면서 조금 더 디테일하게 문법과 오류를 잡아낸다고 설명했다.\u003cbr\u003e\\r\\n\\r\\n```js\\r\\n// 느슨한 모드\\r\\n\\r\\nb =\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/javaScript.png\",\"url\":\"/post/2020-06-11-use_strict\"},{\"slug\":\"2020-04-15-javascriptThis\",\"title\":\"Javascript에서의 This\",\"date\":\"2020-04-15\",\"categories\":[\"javascript\"],\"tags\":[\"javascript\"],\"excerpt\":\"Javascript에서의 This this가 무엇이냐라고 누군가 물어봤을 때 의미 자체에 순간 망설였던 적이 있었다. 그래서 this는 무엇이고 어떻게 동작하는 지에 대해 포스팅 하려고 한다. This 무엇이냐 넌 this. 자바스크립트의 this는 호출한 객체가 저장\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## Javascript에서의 This\\r\\n\\r\\nthis가 무엇이냐라고 누군가 물어봤을 때 의미 자체에 순간 망설였던 적이 있었다.\u003cbr\u003e\\r\\n그래서 this는 무엇이고 어떻게 동작하는 지에 대해 포스팅 하려고 한다.\\r\\n\\r\\n## This 무엇이냐 넌\\r\\nthis. 자바스크립트의 this는 호출한 객체가 저장되어있는 속성이다.\\r\\n\\r\\n```js\\r\\nconsole.log(this);  // window\\r\\n```\\r\\n\\r\\n기본적으로 this는 window 객체의 정보를 저장하고 있다.\u003cbr\u003e\\r\\n기본적으로 사용하는 메서드들 또한 상단에의 window를 통해 호출하기 때문이다.\\r\\n\\r\\n```js\\r\\nwindow.console.log(this);  // window\\r\\n```\\r\\n\u003e console에 찍힌 window 객체를 자세히보기를 열어서 찾으면 console를 찾을 수 있을 것이다.\\r\\n\\r\\nwindow객체의 console 객체의 log 메서드를 통하여 호출하였기에 this는 windo\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/javaScript.png\",\"url\":\"/post/2020-04-15-javascriptThis\"},{\"slug\":\"2020-03-22-webAccessibility_5\",\"title\":\"웹 접근성(견고성)\",\"date\":\"2020-03-22\",\"categories\":[\"html\"],\"tags\":[\"html\",\"Web Accessibility\"],\"excerpt\":\"운용의 용이성 사용자 인터페이스 구성요소는 조작 가능하고 내비게이션 할 수 있어야 한다. 4.1.1 마크업 오류 방지 411 마크업 오류 방지 4.2.1 웹 애플리케이션 접근성 준수 421 웹 애플리케이션 접근성 준수 4.1.1 마크업 오류 방지 마크업 언어의 요소는 \",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## 운용의 용이성\\r\\n사용자 인터페이스 구성요소는 조작 가능하고 내비게이션 할 수 있어야 한다.\\r\\n\\r\\n- [4.1.1 마크업 오류 방지](#411-마크업-오류-방지)\\r\\n- [4.2.1 웹 애플리케이션 접근성 준수](#421-웹-애플리케이션-접근성-준수)\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n### 4.1.1 마크업 오류 방지\\r\\n마크업 언어의 요소는 열고 닫음, 중첩 관계 및 속성 선언에 오류가 없어야 한다.\\r\\n\\r\\n#### 1) 요소의 열고 닫음\\r\\n\\r\\n##### \u003cb style='color:red'\u003e잘못된 소스\u003c/b\u003e\\r\\n```HTML\\r\\n\u003cul\u003e\\r\\n  \u003cli\u003e목록\u003c/li\u003e\\r\\n  \u003cli\u003e목록\u003c/li\u003e\\r\\n  \u003cli\u003e목록\u003c/li\u003e\\r\\n\u003cp\u003e내용\u003c/p\u003e\\r\\n```\\r\\n\\r\\n##### \u003cb style='color:blue'\u003e잘된 소스\u003c/b\u003e\\r\\n```HTML\\r\\n\u003cul\u003e\\r\\n  \u003cli\u003e목록\u003c/li\u003e\\r\\n  \u003cli\u003e목록\u003c/li\u003e\\r\\n  \u003cli\u003e목록\u003c/li\u003e\\r\\n\u003c/ul\u003e\\r\\n\u003cp\u003e내용\u003c/p\u003e\\r\\n```\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/accessibility.jpg\",\"url\":\"/post/2020-03-22-webAccessibility_5\"},{\"slug\":\"2020-03-21-webAccessibility_4\",\"title\":\"웹 접근성(이해의 용이성)\",\"date\":\"2020-03-21\",\"categories\":[\"html\"],\"tags\":[\"html\",\"Web Accessibility\"],\"excerpt\":\"이해의 용이성 콘텐츠는 이해할 수 있어야 한다. 3.1.1 기본 언어 표시 311 기본 언어 표시 3.2.1 사용자 요구에 따른 실행 321 사용자 요구에 따른 실행 3.3.1 콘텐츠의 선형화 331 콘텐츠의 선형화 3.3.2 표의 구성 332 표의 구성 3.4.1 레\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## 이해의 용이성\\r\\n콘텐츠는 이해할 수 있어야 한다.\\r\\n\\r\\n- [3.1.1 기본 언어 표시](#311-기본-언어-표시)\\r\\n- [3.2.1 사용자 요구에 따른 실행](#321-사용자-요구에-따른-실행)\\r\\n- [3.3.1 콘텐츠의 선형화](#331-콘텐츠의-선형화)\\r\\n- [3.3.2 표의 구성](#332-표의-구성)\\r\\n- [3.4.1 레이블 제공](#341-레이블-제공)\\r\\n- [3.4.2 오류 정정](#342-오류-정정)\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n### 3.1.1 기본 언어 표시\\r\\n주로 사용하는 언어를 명시해야 한다.\\r\\n\\r\\n```HTML\\r\\n\u003chtml lang=”ko”\u003e\\r\\n```\\r\\n\u003e HTML5\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n### 3.2.1 사용자 요구에 따른 실행\\r\\n사용자가 의도하지 않은 기능 (새 창, 초점 변화 등)은 실행되지 않아야 한다.\\r\\n\\r\\n#### 1) 페이지 진입시 뜨는 새 창(팝업)\\r\\n\\r\\n\u003cimg src=\\\"https://jayj-fe.github.io/blogAPI/assets/img/webAccessibility/\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/accessibility.jpg\",\"url\":\"/post/2020-03-21-webAccessibility_4\"},{\"slug\":\"2020-03-14-webAccessibility_3\",\"title\":\"웹 접근성(운용의 용이성)\",\"date\":\"2020-03-14\",\"categories\":[\"html\"],\"tags\":[\"html\",\"Web Accessibility\"],\"excerpt\":\"운용의 용이성 사용자 인터페이스 구성요소는 조작 가능하고 내비게이션 할 수 있어야 한다. 2.1.1 키보드 사용 보장 211 키보드 사용 보장 2.1.2 초점 이동 212 초점 이동 2.1.3 조작 가능 213 조작 가능 2.2.1 응답시간 조절 221 응답시간 조절 \",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## 운용의 용이성\\r\\n사용자 인터페이스 구성요소는 조작 가능하고 내비게이션 할 수 있어야 한다.\\r\\n\\r\\n- [2.1.1 키보드 사용 보장](#211-키보드-사용-보장)\\r\\n- [2.1.2 초점 이동](#212-초점-이동)\\r\\n- [2.1.3 조작 가능](#213-조작-가능)\\r\\n- [2.2.1 응답시간 조절](#221-응답시간-조절)\\r\\n- [2.2.2 정지 기능 제공](#222-정지-기능-제공)\\r\\n- [2.3.1 깜빡임과 번쩍임 사용 제한](#231-깜빡임과-번쩍임-사용-제한)\\r\\n- [2.4.1 반복 영역 건너뛰기](#241-반복-영역-건너뛰기)\\r\\n- [2.4.2 제목 제공](#242-제목-제공)\\r\\n- [2.4.3 적절한 링크 텍스트](#243-적절한-링크-텍스트)\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n### 2.1.1 키보드 사용 보장\\r\\n모든 기능은 키보드만으로도 사용할 수 있어야 한다. (PC웹)\u003cbr\u003e\\r\\n터치(touch) 기반 모바일 기기의 모든 컨트롤은 누르기 동작으로 제어\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/accessibility.jpg\",\"url\":\"/post/2020-03-14-webAccessibility_3\"},{\"slug\":\"2020-03-07-webAccessibility_2\",\"title\":\"웹 접근성(인식의 용이성)\",\"date\":\"2020-03-07\",\"categories\":[\"html\"],\"tags\":[\"html\",\"Web Accessibility\"],\"excerpt\":\"인식의 용이성 모든 콘텐츠는 사용자가 인식할 수 있어야 한다. 1.1.1 적절한 대체 텍스트 제공 111 적절한 대체 텍스트 제공 1.2.1 자막 제공 121 자막 제공 1.3.1 색에 무관한 콘텐츠 인식 131 색에 무관한 콘텐츠 인식 1.3.2 명확한 지시사항 제공\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## 인식의 용이성\\r\\n모든 콘텐츠는 사용자가 인식할 수 있어야 한다.\\r\\n\\r\\n- [1.1.1 적절한 대체 텍스트 제공](#111-적절한-대체-텍스트-제공)\\r\\n- [1.2.1 자막 제공](#121-자막-제공)\\r\\n- [1.3.1 색에 무관한 콘텐츠 인식](#131-색에-무관한-콘텐츠-인식)\\r\\n- [1.3.2 명확한 지시사항 제공](#132-명확한-지시사항-제공)\\r\\n- [1.3.3 텍스트 콘텐츠의 명도 대비](#133-텍스트-콘텐츠의-명도-대비)\\r\\n- [1.3.4 자동 재생 금지](#134-자동-재생-금지)\\r\\n- [1.3.5 콘텐츠 간의 구분](#135-콘텐츠-간의-구분)\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n### 1.1.1 적절한 대체 텍스트 제공\\r\\n텍스트 아닌 콘텐츠는 그 의미나 용도를 이해할 수 있도록 대체 텍스트를 제공해야 한다.\\r\\n\\r\\n#### 1) 의미가 있는 이미지는 대체 텍스트를 제공한다.\\r\\n\\r\\n\u003cimg src=\\\"https://jayj-fe.github.io/blogAPI/assets/img/webAccessibility/n\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/accessibility.jpg\",\"url\":\"/post/2020-03-07-webAccessibility_2\"},{\"slug\":\"2020-02-29-webAccessibility_1\",\"title\":\"웹 접근성이란\",\"date\":\"2020-02-29\",\"categories\":[\"html\"],\"tags\":[\"html\",\"Web Accessibility\"],\"excerpt\":\"\u0026nbsp; 이전 회사에서 웹 접근성에 대해 공부를 했었다. 공부했던 내용을 정리해두면 좋겠다는 생각이 있었는데, 미루고 미루다가 이제 정리를 한다. 웹 접근성 Web Accessibility 이란 웹 접근성이란 어떠한 사용자가 접근을 하더라도, 동일한 정보를 제공할 \",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## \u0026nbsp;\\r\\n\\r\\n이전 회사에서 웹 접근성에 대해 공부를 했었다.\u003cbr\u003e\\r\\n공부했던 내용을 정리해두면 좋겠다는 생각이 있었는데,\u003cbr\u003e\\r\\n미루고 미루다가 이제 정리를 한다.\\r\\n\\r\\n## 웹 접근성(Web Accessibility)이란\\r\\n\\r\\n웹 접근성이란 어떠한 사용자가 접근을 하더라도, 동일한 정보를 제공할 수 있도록 보장하는 것이다.\u003cbr\u003e\\r\\n즉, 장애인, 고령자등 모든 사람이 비장애인과 차별되지 않은 정보를 얻을 수 있어야한다.\u003cbr\u003e\\r\\n간단한 예로 이미지가 제공된다고 했을 때, 시각적으로 불편한 사람은 이미지의 정보를 얻을 수 없다.\u003cbr\u003e\\r\\n그렇기에 이미지에 대한 대체 텍스트가 제공되어 텍스트로 정보를 전달할 수 있어야한다.\\r\\n\u003e 시각장애인의 경우, 사이트를 읽어주는 스크린리더라는 프로그램으로 정보에 접근한다.\u003cbr\u003e\\r\\n\u003e 스크린리더는 이미지를 읽어주지 못하기 때문에 이미지 태그의 alt 속성을 이용하여 대체 텍스트를 제공해야한다.\\r\\n\\r\\n\u003cbr\u003e\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/accessibility.jpg\",\"url\":\"/post/2020-02-29-webAccessibility_1\"},{\"slug\":\"2019-08-31-whatIsSass\",\"title\":\"Sass \u0026 SCSS 란?\",\"date\":\"2019-08-31\",\"categories\":[\"css\"],\"tags\":[\"sass\",\"scss\",\"css\"],\"excerpt\":\"\u0026nbsp; 최근 프론트쪽을 담당하는 직군의 기술 스택을 보면 Sass를 심심찮게 볼 수 있습니다. 그래서 Sass는 무엇인가에 대해서 알아보려고 합니다. 본 글에서는 Sass에 대해서만 알아보며, 문법과 컴파일 방법에 대해서는 다루지 않습니다. Sass 란? Sass\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## \u0026nbsp;\\r\\n\\r\\n최근 프론트쪽을 담당하는 직군의 기술 스택을 보면 Sass를 심심찮게 볼 수 있습니다.\\r\\n그래서 Sass는 무엇인가에 대해서 알아보려고 합니다.\\r\\n\\r\\n\u003e 본 글에서는 Sass에 대해서만 알아보며, 문법과 컴파일 방법에 대해서는 다루지 않습니다.\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## Sass 란?\\r\\nSass는 Syntactically Awesome Style Sheets의 약자이며,\\r\\nCSS를 우리가 조금 더 편하게 사용하기 위해 확장한 언어입니다.\\r\\n그러나 웹에서는 CSS만 직접 동작하기 때문에 Sass는 웹에서 사용하기 위해서는 컴파일을 해주어야 합니다.\\r\\n그러기에 Sass는 \u003cb\u003eCSS Preprocessor(CSS 전처리기)\u003c/b\u003e라고 불립니다. \\r\\n\u003e 전처리기 란?\\r\\n\u003e 프로그램을 만들 때 소스파일 \u003e 전처리기 -\u003e 컴파일러 -\u003e  실행파일 순으로 실행되는데,\\r\\n\u003e \u003cb\u003e전처리기(Preprocessor)\u003c/b\u003e는 소스 코딩을 한 후 컴파일\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/sass.png\",\"url\":\"/post/2019-08-31-whatIsSass\"},{\"slug\":\"2019-06-05-CodeigniterAndMVC_Use\",\"title\":\"CI(codeigniter)의 MVC패턴 프로젝트 경험\",\"date\":\"2019-06-05\",\"categories\":[\"Architecture\"],\"tags\":[\"Architecture\",\"Design Pattern\",\"Retrospect\"],\"excerpt\":\"CI codeigniter 의 MVC패턴 프로젝트 후기 회사에서 개발팀에 코드이그나이터를 도입하였다. 개발팀에 도입한다고 해서 사실 크게 관심이 없었으며, 큰 영향도 없을 것이라고 생각했다. 하지만 퍼블리셔 입장에서도 기존의 방식과 조금씩 달랐고 하나씩 경험했던 내용을\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## CI(codeigniter)의 MVC패턴 프로젝트 후기\\r\\n\\r\\n회사에서 개발팀에 코드이그나이터를 도입하였다.\u003cbr\u003e\\r\\n개발팀에 도입한다고 해서 사실 크게 관심이 없었으며,\u003cbr\u003e\\r\\n큰 영향도 없을 것이라고 생각했다.\u003cbr\u003e\\r\\n\u003cbr\u003e\\r\\n하지만 퍼블리셔 입장에서도 기존의 방식과 조금씩 달랐고\u003cbr\u003e\\r\\n하나씩 경험했던 내용을 기록해두려고 한다.\u003cbr\u003e\\r\\n\\r\\n## Codeigniter란\\r\\n\\r\\nCodeigniter(이하 코드이그나이터)란 PHP로 작성된 웹 프레임워크다.\u003cbr\u003e\\r\\nMVC패턴으로 동작한다.\u003cbr\u003e\\r\\n\u003e \u003ca href=\\\"/blog/posts/%2Fpost%2F2019-05-09-whatIsMVC\\\" target=\\\"_blank\\\"\u003eMVC에 관한 포스팅\u003c/a\u003e\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## 기존의 방식과 달라진 퍼블리셔 업무\\r\\n\\r\\n기존의 방식과 제일 크게 달라졌던 점은 역시 MVC패턴을 사용함에 따른 변화이다.\u003cbr\u003e\\r\\n\\r\\n\u003cimg src=\\\"https://jayj-fe.github.io/blogAPI/assets/im\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/codeigniter.png\",\"url\":\"/post/2019-06-05-CodeigniterAndMVC_Use\"},{\"slug\":\"2019-05-09-whatIsMVC\",\"title\":\"MVC패턴에 대해서\",\"date\":\"2019-05-09\",\"categories\":[\"Architecture\"],\"tags\":[\"Architecture\",\"Design Pattern\"],\"excerpt\":\"MVC 란 MVC는 Model, View, Controller의 약자이다. MVC는 사용자 인터페이스, 데이터 및 논리 제어를 구현하는데 널리 사용되는 소프트웨어 디자인 패턴이다. 소프트웨어의 비즈니스 로직과 화면을 구분하는데 중점을 두고 있다. User는 Contro\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## MVC 란\\r\\n\\r\\nMVC는 Model, View, Controller의 약자이다.\u003cbr\u003e\\r\\nMVC는 사용자 인터페이스, 데이터 및 논리 제어를 구현하는데 널리 사용되는 소프트웨어 디자인 패턴이다.\u003cbr\u003e\\r\\n소프트웨어의 비즈니스 로직과 화면을 구분하는데 중점을 두고 있다.\u003cbr\u003e\\r\\n\\r\\n\u003cimg src=\\\"https://jayj-fe.github.io/blogAPI/assets/img/architecture/mvc.png\\\" alt=\\\"\\\" style=\\\"max-width:500px\\\"\u003e\\r\\n\\r\\nUser는 Controller에게 요청하고, Controller는 Model에게 명령을 보내고,\u003cbr\u003e\\r\\nModel은 해당의 데이터를 View에게 제공하여, User는 View를 통해 정보를 얻을 수 있다.\u003cbr\u003e\\r\\n\u003cbr\u003e\\r\\n하나 하나의 기능을 자세히 살펴보면 아래와 같다.\u003cbr\u003e\\r\\n\u003cbr\u003e\\r\\n\\r\\n### Model\\r\\n\\r\\n모델(model)이란 어떠한 동작을 수행하는 코드를 말한다.\u003cbr\u003e\\r\\n모델은 데이터가 무엇인지를 정의한다.\u003cbr\u003e\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/mvc.jpg\",\"url\":\"/post/2019-05-09-whatIsMVC\"},{\"slug\":\"2019-02-10-requirejs_use\",\"title\":\"Require.js 을 사용했던 프로젝트에 대한 회고\",\"date\":\"2019-02-10\",\"categories\":[\"javascript\"],\"tags\":[\"javascript\",\"AMD\",\"require.js\",\"Retrospect\"],\"excerpt\":\"Require.js 을 사용했던 프로젝트에 대한 회고 기존의 프로젝트를 진행할 때에는 필요한 기능을 전역 함수 파일에 추가하여 사용했다. 전역 파일에 기능을 추가하여 사용하다보니 기능이 늘어날 수록 코드는 복잡해져갔으며 모든 페이지에서 불필요한 기능까지 전부 호출하는게\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## Require.js 을 사용했던 프로젝트에 대한 회고\\r\\n\\r\\n기존의 프로젝트를 진행할 때에는 필요한 기능을 전역 함수 파일에 추가하여 사용했다.\u003cbr\u003e\\r\\n전역 파일에 기능을 추가하여 사용하다보니 기능이 늘어날 수록 코드는 복잡해져갔으며 \u003cbr\u003e\\r\\n모든 페이지에서 불필요한 기능까지 전부 호출하는게 비효율적으로 느껴졌다.\u003cbr\u003e\\r\\n\u003cbr\u003e\\r\\n그렇기에 최근 알게 되었던 AMD/Require.js에 관심을 더욱 가지게 되었으며, \u003cbr\u003e\\r\\n신규 프로젝트에 Require.js를 사용해보기 했다.\u003cbr\u003e\\r\\n\u003e \u003ca href=\\\"/blog/posts/%2Fpost%2F2018-06-23-AMD_requirejs\\\"\u003eAMD / Require.js에 대한 포스팅\u003c/a\u003e\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n### 프로젝트 초반\\r\\n\\r\\n디자인을 보고 퍼블리싱하며, 공통으로 쓰이는 기능과 특정 페이지에서 사용 되는 기능을 파악했다.\u003cbr\u003e\\r\\n공통으로 쓰이는 기능들 가운데, 기존 전역 함수에 있었\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/javaScript.png\",\"url\":\"/post/2019-02-10-requirejs_use\"},{\"slug\":\"2018-11-18-HTTP_HTTPS_Status_Code\",\"title\":\"HTTP 와 HTTPS, Status Code\",\"date\":\"2018-11-18\",\"categories\":[\"HTTP\"],\"tags\":[\"HTTP\"],\"excerpt\":\"\u0026nbsp; 인터넷을 사용하다보면 HTTP와 HTTPS로 시작되는 주소를 볼 수 있다. 어떤 차이가 있어서 HTTP와 HTTPS를 나눠서 쓰는지 알아보려고 한다. HTTP HTTP는 Hyper Text Transfer Protocol 의 약자로 World Wide We\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## \u0026nbsp;\\r\\n  \\r\\n인터넷을 사용하다보면 HTTP와 HTTPS로 시작되는 주소를 볼 수 있다.    \\r\\n어떤 차이가 있어서 HTTP와 HTTPS를 나눠서 쓰는지 알아보려고 한다.  \\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n### HTTP\\r\\nHTTP는 \u003cb\u003eHyper Text Transfer Protocol\u003c/b\u003e의 약자로  \\r\\nWorld Wide Web에서 사용되는 기본 프로토콜이며 이 프로토콜은 메시지가 형식화되고  \\r\\n전송되는 방법과 다양한 명령에 대한 응답으로 \u003cb\u003e웹 서버와 브라우저가 수행해야하는 작업을 정의\u003c/b\u003e한다.  \\r\\n\u003cbr\u003e\\r\\n  \\r\\n### HTTPS\\r\\nHTTPS는 \u003cb\u003eHyper Text Transfer Protocol over Secure sockets layter\u003c/b\u003e의 약자이다.  \\r\\n기존의 HTTP는 보안장치 없이 그대로 정보를 전송하기에 보안에 취약하다.  \\r\\n그 보안에 취약한 문제를 해결하고자 HTTP에 secure sockets lay\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/httphttps.jpg\",\"url\":\"/post/2018-11-18-HTTP_HTTPS_Status_Code\"},{\"slug\":\"2018-11-05-amp_conference\",\"title\":\"AMP Conference\",\"date\":\"2018-11-05\",\"categories\":[\"conference\"],\"tags\":[\"conference\"],\"excerpt\":\"AMP Accelerated Mobile Pages AMP는 Accelerated Mobile Pages의 약자로 Google에서 만든 오픈소스이며, 웹 페이지를 빠르고 번개와 같이 즉시 로딩 될 수 있게 모바일 웹의 성능을 높이기 위한 목적을 가지고 있는 오픈소스 라\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## AMP(Accelerated Mobile Pages)\\r\\nAMP는 Accelerated Mobile Pages의 약자로 Google에서 만든 오픈소스이며,  \\r\\n웹 페이지를 빠르고 번개와 같이 즉시 로딩 될 수 있게  \\r\\n모바일 \u003cb\u003e웹의 성능을 높이기 위한 목적을 가지고 있는 오픈소스 라이브러리\u003c/b\u003e다.\\r\\n  \\r\\n\u003cbr\u003e\\r\\n  \\r\\n### AMP의 특징\\r\\nAMP의 특징으로는 \u003cb\u003e즉시 페이지를 로드한다는 큰 틀안에서 이루어진다\u003c/b\u003e.  \\r\\n비동기 스크립트만을 이용하여 페이지의 성능을 개선하고,  \\r\\n이미지와 iframe 등도 다운로드 전에 크기와 위치를 잡아 성능을 개선한다.  \\r\\n또한 css를 인라인으로 작성하여 호출할 때 보다 페이지를 더 빠르게 로드한다.  \\r\\n\u003e 추가적인 정보 : \u003ca href=\\\"https://www.ampproject.org/ko/learn/about-how/\\\" target=\\\"_blank\\\"\u003ehttps://www.ampproj\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/amp.jpg\",\"url\":\"/post/2018-11-05-amp_conference\"},{\"slug\":\"2018-07-08-node_init\",\"title\":\"Node.js 란?\",\"date\":\"2018-07-08\",\"categories\":[\"nodejs\"],\"tags\":[\"nodejs\"],\"excerpt\":\"Node.js 란? JavaScript는 Browser에서 작동하는 JavaScript와 V8 JavaScript 엔진으로 빌드된 JavaScript 런타임 환경에서 돌아가는 JavaScript가 있다. Node.js는 V8 JavaScript 엔진으로 빌드된 Java\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## Node.js 란?\\r\\n\\r\\nJavaScript는 Browser에서 작동하는 JavaScript와 V8 JavaScript 엔진으로 빌드된 JavaScript 런타임 환경에서 돌아가는 JavaScript가 있다.  \\r\\n  \\r\\n\u003cb\u003eNode.js는 V8 JavaScript 엔진으로 빌드된 JavaScript 런타임 환경에서 돌아가는 JavaScript 이다.\u003c/b\u003e  \\r\\n런타임 환경에서 JavaScript로 서버를 구성할 수 있는 것일 뿐, Node.js 자체는 서버가 아니다.  \\r\\n\u003e node.js !== 서버  \\r\\n\\r\\n\u003cbr\u003e\\r\\nBrowser에서 돌아가는 JavaScript와 런타임 환경에서 돌아가는 JavaScript는 차이가 있다.  \\r\\n한 가지의 차이를 예를 들면,  \\r\\nBrowser에서 돌아가는 JavaScript에서 전역객체는 window 이지만,  \\r\\n런타임 환경에서 돌아가는 JavaScript에서 전역객체는 global 이다.\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/nodejs.png\",\"url\":\"/post/2018-07-08-node_init\"},{\"slug\":\"2018-06-23-AMD_requirejs\",\"title\":\"AMD \u0026 require.js\",\"date\":\"2018-06-23\",\"categories\":[\"javascript\"],\"tags\":[\"javascript\",\"AMD\",\"require.js\"],\"excerpt\":\"AMD AMD Asynchronous Module Definition 란 모듈을 정의하는 방법과 모듈이 필요할 때 비동기로 로딩하는 방법을 정의한 API 이다. AMD는 세 가지의 핵심 개념을 가지고 동작한다. 1. 동적 로딩 동적 로딩 Dynamic Loading, \",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## AMD\\r\\n\\r\\nAMD(Asynchronous Module Definition)란 모듈을 정의하는 방법과 모듈이 필요할 때 비동기로 로딩하는 방법을 정의한 API 이다.\\r\\nAMD는 세 가지의 핵심 개념을 가지고 동작한다.\\r\\n\u003cbr\u003e\\r\\n#### 1. 동적 로딩\\r\\n\\r\\n동적 로딩(Dynamic Loading, Lazy Loading)은 페이지 렌더링을 방해하지 않으면서 필요한 파일만 로딩할 수 있다.\\r\\n\\r\\n브라우저는 문서를 위에서 아래로 읽어내려오며, \\\\\u003cscript\\\\\u003e 태그를 만나면 \\\\\u003cscript\\\\\u003e의 HTTP 요청과 다운로드, 파싱(Parsing), 실행이 일어나는 동안 브라우저는 다른 동작을 하지 않는다.\\r\\n그로 인하여 페이지 렌더링은 느려지는데, 이를 최적화 하는 기법으로 \\\\\u003cscript\\\\\u003e 태그를 \\\\\u003cbody\\\\\u003e 태그의 마지막에 배치하는 방법이 있다.\\r\\n하지만 이 방법 또한 첫 렌더링과 첫 인터랙션에 필요하지 않은, 페이지에 필요한 모든 JavaSc\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/javaScript.png\",\"url\":\"/post/2018-06-23-AMD_requirejs\"},{\"slug\":\"2018-05-11-Call_Stack_and_Event_Loop\",\"title\":\"Javascript Call Stack and Event Loop\",\"date\":\"2018-05-11\",\"categories\":[\"javascript\"],\"tags\":[\"javascript\"],\"excerpt\":\"Call Stack and Event Loop 호출 스택 및 이벤트 루프 자바 스크립트 엔진 javascript 를 해석하고 실행하는 인터프리터. 인터프리터 : 프로그래밍 언어의 소스 코드를 바로 실행하는 컴퓨터 프로그램 또는 환경을 말한다. 엔진에는 4가지로 구성되어\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## Call Stack and Event Loop\\r\\n\u003e 호출 스택 및 이벤트 루프\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n### 자바 스크립트 엔진\\r\\njavascript 를 해석하고 실행하는 인터프리터.\\r\\n\u003e 인터프리터 : 프로그래밍 언어의 소스 코드를 바로 실행하는 컴퓨터 프로그램 또는 환경을 말한다.\\r\\n\\r\\n엔진에는 4가지로 구성되어있다.\\r\\n- [Heap](#heap)\\r\\n- [CallStack](#callstack)\\r\\n- [EventQueue](#eventqueue)\\r\\n- [EventLoop](#eventloop)\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n### Heap\\r\\n객체나 변수 값들이 들어가있는 영역으로 메모리의 할당이 일어나는 곳이다.\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n### CallStack\\r\\n\\r\\nCall Stack은 코드 실행에 따라 호출 스택(task)이 쌓이는 곳이다.\u003cbr\u003e\\r\\n자바스크립트는 기본적으로 싱글 쓰레드 기반 언어이다.\u003cbr\u003e\\r\\n따라서 코드 순서에 따라 호출 스택(task)이 쌓이\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/javaScript.png\",\"url\":\"/post/2018-05-11-Call_Stack_and_Event_Loop\"},{\"slug\":\"2018-05-04-Execution_Context\",\"title\":\"Javascript 실행 컨텍스트\",\"date\":\"2018-05-04\",\"categories\":[\"javascript\"],\"tags\":[\"javascript\"],\"excerpt\":\"Javascript 실행 컨텍스트 실행 컨테스트란 자바스크립트가 실행될 때 생성되는 실행 단위를 실행 컨텍스트라고 부른다. 자바스크립트가 실행되면 함수들이 차곡차곡 콜 스택 Call Stack 이라 곳에 쌓이는데, 실행 컨텍스트는 Call Stack에 쌓이는 하나하나의\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## Javascript 실행 컨텍스트\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n### 실행 컨테스트란\\r\\n\\r\\n자바스크립트가 실행될 때 생성되는 실행 단위를 실행 컨텍스트라고 부른다.  \\r\\n자바스크립트가 실행되면 함수들이 차곡차곡 \u003cb\u003e콜 스택(Call Stack)\u003c/b\u003e이라 곳에 쌓이는데,  \\r\\n\u003cb\u003e실행 컨텍스트는 Call Stack에 쌓이는 하나하나의 실행 정보\u003c/b\u003e이다.\\r\\n\\r\\n```js\\r\\n\\r\\nconsole.log('전역 스코프');\\r\\nfunction first(){\\r\\n  console.log('First Context');\\r\\n  second();\\r\\n}\\r\\nfunction second(){\\r\\n  console.log('Second Context');\\r\\n}\\r\\nfirst();\\r\\n\\r\\n// 컨텍스트 실행순서\\r\\n// 1. console.log('전역 스코프') 컨텍스트에 들어감  \\r\\n// 2. first함수가 컨텍스트에 들어감  \\r\\n// 3. second함수가 컨텍스트에 들어감\\r\\n/\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/javaScript.png\",\"url\":\"/post/2018-05-04-Execution_Context\"},{\"slug\":\"2018-04-09-stop_event_propagation\",\"title\":\"How do you stop event propagation?\",\"date\":\"2018-04-09\",\"categories\":[\"javascript\"],\"tags\":[\"javascript\"],\"excerpt\":\"How do you stop event propagation? 이벤트 전파를 어떻게 중지합니까? 이벤트 전파란? html css css .boxDiv{border:1px solid 000;padding:20px} .click01{width:300px;margin:0 5\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## How do you stop event propagation?\\r\\n\u003e 이벤트 전파를 어떻게 중지합니까?\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n### 이벤트 전파란?\\r\\n\\r\\n#### html\\r\\n```html\\r\\n\u003cdiv class=\\\"boxDiv click01\\\"\u003e\\r\\n    \u003cp\u003e3\u003c/p\u003e\\r\\n    \u003cdiv class=\\\"boxDiv click02\\\"\u003e\\r\\n        \u003cp\u003e2\u003c/p\u003e\\r\\n        \u003cdiv class=\\\"boxDiv click03\\\"\u003e\\r\\n            \u003cp\u003e1\u003c/p\u003e\\r\\n        \u003c/div\u003e\\r\\n    \u003c/div\u003e\\r\\n\u003c/div\u003e\\r\\n\u003cp class=\\\"result\\\"\u003e\u003c/p\u003e\\r\\n```\\r\\n#### css\\r\\n```css\\r\\n.boxDiv{border:1px solid #000;padding:20px}\\r\\n.click01{width:300px;margin:0 50px;background:#aaa}\\r\\n.click02{background:#ddd}\\r\\n.click03{backg\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/javaScript.png\",\"url\":\"/post/2018-04-09-stop_event_propagation\"},{\"slug\":\"2018-03-29-Where_do_you_place_the_JavaScript\",\"title\":\"Where do you place the JavaScript?\",\"date\":\"2018-03-29\",\"categories\":[\"javascript\"],\"tags\":[\"javascript\"],\"excerpt\":\"Where do you place the JavaScript? JavaScript는 어디에 두어야합니까? 1. Head, Body head Tag 섹션에 삽입하거나 body Tag 섹션의 시작 부분에 놓는 방법은 안좋다. 해당 부분에 위치시킬 경우 문서는 페이지 로드시\",\"content\":\"---\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n## Where do you place the JavaScript?\\r\\n\u003e JavaScript는 어디에 두어야합니까?\\r\\n\\r\\n\u003cbr\u003e\\r\\n\\r\\n### 1. Head, Body\\r\\nhead Tag 섹션에 삽입하거나 body Tag 섹션의 시작 부분에 놓는 방법은 안좋다.  \\r\\n해당 부분에 위치시킬 경우 문서는 페이지 로드시  \\r\\n페이지를 읽다가 script Tag를 만날 경우 페이지의 분석을 멈추고  \\r\\n스크립트를 로드한 후 페이지를 읽기 때문에 성능면에서 안좋다.  \\r\\n\u003cbr\u003e\\r\\n\\r\\n#### 브라우저가 웹 사이트를 로드 할 때 일어나는 일\\r\\n1. 문서 가져 온다 (예 : index.html, index.asp, main.php ...등)\\r\\n2. HTML 구문 분석한다.\\r\\n3. 파서는 문서를 위에서 부터 아래로 읽는다.  \\r\\n    중간에 외부 스크립트 파일을 참조하는 script Tag를 발견한다.\\r\\n4. 브라우저가 스크립트 파일을 확인하고 요청한다.\",\"img\":\"https://jayj-fe.github.io/blogAPI/assets/img/javaScript.png\",\"url\":\"/post/2018-03-29-Where_do_you_place_the_JavaScript\"}],\"categories\":[{\"name\":\"javascript\",\"count\":43},{\"name\":\"ReactJs\",\"count\":28},{\"name\":\"Firebase\",\"count\":1},{\"name\":\"html\",\"count\":13},{\"name\":\"css\",\"count\":7},{\"name\":\"NextJs\",\"count\":1},{\"name\":\"astroJs\",\"count\":1},{\"name\":\"MUI\",\"count\":1},{\"name\":\"VueJs\",\"count\":8},{\"name\":\"Git\",\"count\":2},{\"name\":\"HTTP\",\"count\":6},{\"name\":\"axios\",\"count\":1},{\"name\":\"Architecture\",\"count\":2},{\"name\":\"conference\",\"count\":1},{\"name\":\"nodejs\",\"count\":1}]}]\n"])</script></body></html>
